// — Voice API section (Minimax: group id, api key, models + fetch, presets, save)
const VoiceApiSection = ({ onBack }) => {
  const storageKey = 'klp_voice_api';
  const presetsKey = 'klp_voice_api_presets';

  const initial = () => {
    try { return JSON.parse(localStorage.getItem(storageKey) || '{}'); }
    catch { return {}; }
  };
  const [values, setValues] = React.useState(() => ({ provider: 'minimax', ...initial() }));
  const [presets, setPresets] = React.useState(() => { try { return JSON.parse(localStorage.getItem(presetsKey) || '[]'); } catch { return []; } });
  const [revealed, setRevealed] = React.useState(false);
  const [fetchState, setFetchState] = React.useState('idle');
  const [modelList, setModelList] = React.useState([]);
  const [showModels, setShowModels] = React.useState(false);
  const [saveState, setSaveState] = React.useState('idle');
  const [presetName, setPresetName] = React.useState('');
  const [presetOpen, setPresetOpen] = React.useState(false);

  const set = (k, v) => setValues(prev => ({ ...prev, [k]: v }));

  const handleSave = () => {
    localStorage.setItem(storageKey, JSON.stringify(values));
    setSaveState('ok');
    setTimeout(() => setSaveState('idle'), 1400);
  };

  // Minimax TTS has a known voice/model catalog; fetch attempts the voices endpoint
  const MINIMAX_FALLBACK_MODELS = [
    'speech-02-hd',
    'speech-02-turbo',
    'speech-01-hd',
    'speech-01-turbo',
    'speech-01-240228',
  ];

  const handleFetchModels = async () => {
    if (!values.apiKey || !values.groupId) {
      setFetchState('err');
      setTimeout(() => setFetchState('idle'), 1600);
      return;
    }
    setFetchState('loading');
    try {
      // Minimax doesn't expose a public models list endpoint the same way OpenAI does,
      // so we try the voice catalog and fall back to a known model list.
      const url = `https://api.minimaxi.chat/v1/get_voice?GroupId=${encodeURIComponent(values.groupId)}`;
      let ids = [];
      try {
        const res = await fetch(url, { headers: { 'Authorization': `Bearer ${values.apiKey}` } });
        if (res.ok) {
          const data = await res.json();
          const voices = data.system_voice || data.voice_slots || data.voices || [];
          ids = voices.map(v => v.voice_id || v.id || v.name).filter(Boolean);
        }
      } catch (_) { /* ignore */ }
      if (ids.length === 0) ids = MINIMAX_FALLBACK_MODELS;
      setModelList(ids);
      setShowModels(true);
      setFetchState('ok');
    } catch (e) {
      setFetchState('err');
      setTimeout(() => setFetchState('idle'), 1800);
    }
  };

  const savePreset = () => {
    const name = presetName.trim();
    if (!name) return;
    const entry = { name, provider: values.provider || 'minimax', groupId: values.groupId || '', apiKey: values.apiKey || '', model: values.model || '' };
    const next = [...presets.filter(p => p.name !== name), entry];
    setPresets(next);
    localStorage.setItem(presetsKey, JSON.stringify(next));
    setPresetName('');
    setPresetOpen(false);
  };
  const loadPreset = (p) => {
    setValues({ provider: p.provider || 'minimax', groupId: p.groupId || '', apiKey: p.apiKey || '', model: p.model || '' });
    setModelList([]); setShowModels(false);
  };
  const deletePreset = (name) => {
    const next = presets.filter(p => p.name !== name);
    setPresets(next);
    localStorage.setItem(presetsKey, JSON.stringify(next));
  };

  const inputStyle = {
    width: '100%', fontFamily: 'var(--font-sans)',
    fontSize: 13, padding: '10px 12px',
    border: '0.5px solid var(--outline-variant)', borderRadius: 10,
    background: 'var(--surface)', color: 'var(--on-surface)', outline: 'none',
    boxSizing: 'border-box',
  };
  const labelStyle = {
    fontSize: 11, fontFamily: 'var(--font-sans)', fontWeight: 600,
    color: 'var(--on-surface-variant)', letterSpacing: 0.18, textTransform: 'uppercase',
    marginBottom: 6, display: 'block',
  };

  return (
    <div style={{ display: 'flex', flexDirection: 'column', height: '100%' }}>
      <SectionHeader title="Voice API" onBack={onBack} />
      <div style={{ flex: 1, overflowY: 'auto', padding: '0 0 24px' }} className="no-scrollbar">
        <div style={{ fontFamily: 'var(--font-serif)', fontSize: 15, fontStyle: 'italic', color: 'var(--on-surface-variant)', padding: '4px 24px 14px' }}>
          Text-to-speech for character messages and diary dictation.
        </div>

        {/* Presets bar */}
        <div style={{ padding: '0 16px 16px' }}>
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 8 }}>
            <span style={labelStyle}>Presets</span>
            <button onClick={() => setPresetOpen(o => !o)} style={{
              background: 'transparent', border: 0, cursor: 'pointer',
              color: 'var(--primary)', fontSize: 11, fontWeight: 600,
              display: 'inline-flex', alignItems: 'center', gap: 3,
            }}>
              <span className="msi" style={{ fontSize: 14 }} data-icon="add"></span>Save current
            </button>
          </div>
          {presets.length === 0 ? (
            <div style={{
              padding: '10px 12px', borderRadius: 10,
              background: 'var(--surface-container-low)',
              fontSize: 11, color: 'var(--on-surface-variant)', fontStyle: 'italic',
            }}>
              No voice presets yet. Fill out the form below and tap "Save current" to store it.
            </div>
          ) : (
            <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6 }}>
              {presets.map(p => (
                <div key={p.name} style={{
                  display: 'inline-flex', alignItems: 'center', gap: 4,
                  background: 'var(--surface-container-low)',
                  border: '0.5px solid var(--outline-variant)',
                  borderRadius: 9999, padding: '4px 4px 4px 12px',
                }}>
                  <button onClick={() => loadPreset(p)} style={{
                    background: 'transparent', border: 0, cursor: 'pointer', padding: '4px 4px',
                    fontSize: 12, fontFamily: 'var(--font-sans)', color: 'var(--on-surface)', fontWeight: 500,
                  }}>{p.name}</button>
                  <button onClick={() => deletePreset(p.name)} title="Delete preset" style={{
                    background: 'transparent', border: 0, cursor: 'pointer',
                    color: 'var(--on-surface-variant)', padding: 4,
                    display: 'inline-flex', alignItems: 'center',
                  }}><span className="msi" style={{ fontSize: 14 }} data-icon="close"></span></button>
                </div>
              ))}
            </div>
          )}
          {presetOpen && (
            <div style={{ display: 'flex', gap: 6, marginTop: 8 }}>
              <input
                value={presetName} onChange={e => setPresetName(e.target.value)}
                placeholder="Preset name (e.g. Minimax — Serene)"
                onKeyDown={e => { if (e.key === 'Enter') savePreset(); }}
                style={{ ...inputStyle, flex: 1, fontSize: 12, padding: '8px 10px' }}
              />
              <button onClick={savePreset} disabled={!presetName.trim()} style={{
                background: presetName.trim() ? 'var(--primary)' : 'var(--surface-container)',
                color: presetName.trim() ? 'var(--on-primary)' : 'var(--outline)',
                border: 0, borderRadius: 10, padding: '8px 14px',
                cursor: presetName.trim() ? 'pointer' : 'default',
                fontSize: 12, fontWeight: 600,
              }}>Save</button>
            </div>
          )}
        </div>

        {/* Provider */}
        <div style={{ padding: '0 16px 14px' }}>
          <label style={labelStyle}>Provider</label>
          <select value={values.provider || 'minimax'} onChange={e => set('provider', e.target.value)} style={{
            ...inputStyle, appearance: 'none',
          }}>
            <option value="minimax">Minimax</option>
          </select>
        </div>

        {/* Group ID */}
        <div style={{ padding: '0 16px 14px' }}>
          <label style={labelStyle}>Group ID</label>
          <input
            value={values.groupId || ''}
            onChange={e => set('groupId', e.target.value)}
            placeholder="Your Minimax Group ID"
            style={{ ...inputStyle, fontFamily: 'ui-monospace, SFMono-Regular, Menlo, monospace' }}
          />
          <div style={{ fontSize: 10, color: 'var(--on-surface-variant)', marginTop: 6 }}>
            Find this in your Minimax console under Account settings.
          </div>
        </div>

        {/* API Key */}
        <div style={{ padding: '0 16px 14px' }}>
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 6 }}>
            <label style={{ ...labelStyle, marginBottom: 0 }}>API key</label>
            <button onClick={() => setRevealed(r => !r)} style={{
              background: 'transparent', border: 0, cursor: 'pointer',
              color: 'var(--on-surface-variant)', fontSize: 11, fontFamily: 'var(--font-sans)',
              display: 'inline-flex', alignItems: 'center', gap: 3,
            }}>
              <span className="msi" style={{ fontSize: 14 }}>{revealed ? 'visibility_off' : 'visibility'}</span>
              {revealed ? 'Hide' : 'Show'}
            </button>
          </div>
          <input
            type={revealed ? 'text' : 'password'}
            value={values.apiKey || ''}
            onChange={e => set('apiKey', e.target.value)}
            placeholder="eyJhbG..."
            style={{
              ...inputStyle,
              fontFamily: 'ui-monospace, SFMono-Regular, Menlo, monospace',
              letterSpacing: revealed ? 'normal' : '2px',
            }}
          />
        </div>

        {/* Model + Fetch */}
        <div style={{ padding: '0 16px 18px' }}>
          <label style={labelStyle}>Model</label>
          <div style={{ display: 'flex', gap: 6 }}>
            <input
              value={values.model || ''}
              onChange={e => set('model', e.target.value)}
              placeholder="e.g. speech-02-hd"
              style={{ ...inputStyle, flex: 1 }}
            />
            <button onClick={handleFetchModels} disabled={fetchState === 'loading'} style={{
              background: fetchState === 'err' ? '#c75a5a'
                : fetchState === 'ok' ? 'var(--primary)'
                : 'var(--surface-container-high)',
              color: fetchState === 'err' || fetchState === 'ok' ? '#fff' : 'var(--on-surface)',
              border: '0.5px solid var(--outline-variant)',
              borderRadius: 10, padding: '0 14px',
              cursor: fetchState === 'loading' ? 'wait' : 'pointer',
              fontSize: 12, fontWeight: 600,
              display: 'inline-flex', alignItems: 'center', gap: 5,
              minWidth: 82, justifyContent: 'center',
            }}>
              <span className="msi" style={{
                fontSize: 16,
                animation: fetchState === 'loading' ? 'jiggle 0.3s infinite' : 'none',
              }}>{fetchState === 'err' ? 'error' : fetchState === 'ok' ? 'check' : 'download'}</span>
              {fetchState === 'loading' ? 'Fetching' : fetchState === 'err' ? 'Failed' : 'Fetch'}
            </button>
          </div>

          {showModels && modelList.length > 0 && (
            <div style={{
              marginTop: 8, maxHeight: 180, overflowY: 'auto',
              background: 'var(--surface-container-low)', borderRadius: 10,
              border: '0.5px solid var(--outline-variant)',
            }} className="no-scrollbar">
              {modelList.map(id => (
                <button key={id} onClick={() => { set('model', id); setShowModels(false); }} style={{
                  display: 'flex', width: '100%', alignItems: 'center', gap: 8,
                  padding: '8px 12px', background: 'transparent', border: 0, cursor: 'pointer',
                  borderBottom: '0.5px solid var(--outline-variant)', textAlign: 'left',
                  fontFamily: 'ui-monospace, monospace', fontSize: 11, color: 'var(--on-surface)',
                }}>
                  {values.model === id && <span className="msi" style={{ fontSize: 14, color: 'var(--primary)' }} data-icon="check"></span>}
                  <span style={{ flex: 1 }}>{id}</span>
                </button>
              ))}
            </div>
          )}
          <div style={{ fontSize: 10, color: 'var(--on-surface-variant)', marginTop: 6 }}>
            Fetch pulls available voices from Minimax using your Group ID + key.
          </div>
        </div>

        {/* Save button */}
        <div style={{ padding: '0 16px 16px' }}>
          <button onClick={handleSave} style={{
            width: '100%',
            background: saveState === 'ok' ? '#6d8a6d' : 'var(--primary)',
            color: 'var(--on-primary)', border: 0, borderRadius: 12,
            padding: '12px', cursor: 'pointer',
            fontSize: 13, fontWeight: 700, fontFamily: 'var(--font-sans)',
            display: 'inline-flex', alignItems: 'center', justifyContent: 'center', gap: 6,
          }}>
            <span className="msi" style={{ fontSize: 16 }}>{saveState === 'ok' ? 'check' : 'save'}</span>
            {saveState === 'ok' ? 'Saved' : 'Save configuration'}
          </button>
        </div>

        {/* Storage notice */}
        <div style={{ padding: '0 24px' }}>
          <div style={{
            padding: 12, borderRadius: 12,
            background: 'var(--surface-container-low)',
            fontSize: 11, color: 'var(--on-surface-variant)', lineHeight: 1.5,
          }}>
            <span className="msi" style={{ fontSize: 14, verticalAlign: -2, marginRight: 6 }} data-icon="lock"></span>
            Keys and presets are stored locally on this device only.
          </div>
        </div>
      </div>
    </div>
  );
};

// — Generic API key section
const ApiKeySection = ({ title, onBack, storageKey, fields, description }) => {
  const [values, setValues] = React.useState(() => {
    try { return JSON.parse(localStorage.getItem(storageKey) || '{}'); } catch { return {}; }
  });
  const [revealed, setRevealed] = React.useState({});
  const save = (k, v) => {
    const next = { ...values, [k]: v };
    setValues(next);
    localStorage.setItem(storageKey, JSON.stringify(next));
  };
  return (
    <div style={{ display: 'flex', flexDirection: 'column', height: '100%' }}>
      <SectionHeader title={title} onBack={onBack} />
      <div style={{ flex: 1, overflowY: 'auto', padding: '0 0 20px' }} className="no-scrollbar">

          {description}
        </div>
        {fields.map((f, gi) => (
          <SettingsGroup key={f.key} header={f.header || null}>
            <div style={{ padding: 12 }}>
              <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 6 }}>
                <label style={{ fontSize: 11, fontFamily: 'var(--font-sans)', fontWeight: 600, color: 'var(--on-surface-variant)', letterSpacing: 0.18, textTransform: 'uppercase' }}>{f.label}</label>
                {f.secret && (
                  <button onClick={() => setRevealed(r => ({ ...r, [f.key]: !r[f.key] }))} style={{
                    background: 'transparent', border: 0, cursor: 'pointer',
                    color: 'var(--on-surface-variant)', fontSize: 11, fontFamily: 'var(--font-sans)',
                    display: 'flex', alignItems: 'center', gap: 3,
                  }}>
                    <span className="msi" style={{ fontSize: 14 }}>{revealed[f.key] ? 'visibility_off' : 'visibility'}</span>
                    {revealed[f.key] ? 'Hide' : 'Show'}
                  </button>
                )}
              </div>
              {f.type === 'select' ? (
                <select value={values[f.key] || f.options[0]} onChange={e => save(f.key, e.target.value)} style={{
                  width: '100%', fontFamily: 'var(--font-sans)', fontSize: 13,
                  padding: '8px 10px', border: '0.5px solid var(--outline-variant)', borderRadius: 10,
                  background: 'var(--surface)', color: 'var(--on-surface)', outline: 'none',
                }}>
                  {f.options.map(o => <option key={o} value={o}>{o}</option>)}
                </select>
              ) : (
                <input
                  type={f.secret && !revealed[f.key] ? 'password' : 'text'}
                  value={values[f.key] || ''}
                  onChange={e => save(f.key, e.target.value)}
                  placeholder={f.placeholder}
                  style={{
                    width: '100%', fontFamily: f.secret ? 'var(--font-mono, monospace)' : 'var(--font-sans)',
                    fontSize: 13, padding: '8px 10px',
                    border: '0.5px solid var(--outline-variant)', borderRadius: 10,
                    background: 'var(--surface)', color: 'var(--on-surface)', outline: 'none',
                    letterSpacing: f.secret && !revealed[f.key] ? '2px' : 'normal',
                  }}
                />
              )}
              {f.hint && <div style={{ fontSize: 10, color: 'var(--on-surface-variant)', marginTop: 6 }}>{f.hint}</div>}
            </div>
          </SettingsGroup>
        ))}
        <div style={{ padding: '0 24px' }}>
          <div style={{
            padding: 12, borderRadius: 12,
            background: 'var(--surface-container-low)',
            fontSize: 11, color: 'var(--on-surface-variant)', lineHeight: 1.5,
          }}>
            <span className="msi" style={{ fontSize: 14, verticalAlign: -2, marginRight: 6 }} data-icon="lock"></span>
            Keys are stored locally on this device only.
          </div>
        </div>
      </div>
    </div>
  );
};

// — Export section
const ExportSection = ({ onBack }) => {
  const [busy, setBusy] = React.useState(null);
  const [lastMsg, setLastMsg] = React.useState('');

  const runExport = (kind) => {
    setBusy(kind);
    setTimeout(() => {
      try {
        const payload = {
          exportedAt: new Date().toISOString(),
          kind,
          profile: { name: 'ハナ', handle: '@angelica' },
          data: JSON.parse(localStorage.getItem('klp_state') || '{}'),
        };
        const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = `kitty-${kind}-${Date.now()}.json`; a.click();
        URL.revokeObjectURL(url);
        setLastMsg(`Exported ${kind} · just now`);
      } catch (e) {
        setLastMsg('Export failed');
      }
      setBusy(null);
    }, 600);
  };

  const items = [
    { id: 'all', icon: 'inventory_2', label: 'Full backup', detail: 'Everything · JSON' },
    { id: 'diary', icon: 'auto_stories', label: 'Diary entries', detail: 'Text + metadata' },
    { id: 'messages', icon: 'chat', label: 'Messages', detail: 'Conversations + Moments' },
    { id: 'calendar', icon: 'event', label: 'Calendar', detail: 'Schedules' },
    { id: 'contacts', icon: 'contacts', label: 'Contacts', detail: 'vCard compatible' },
  ];

  return (
    <div style={{ display: 'flex', flexDirection: 'column', height: '100%' }}>
      <SectionHeader title="Export" onBack={onBack} />
      <div style={{ flex: 1, overflowY: 'auto', padding: '0 0 20px' }} className="no-scrollbar">
        <div style={{ fontFamily: 'var(--font-serif)', fontSize: 15, fontStyle: 'italic', color: 'var(--on-surface-variant)', padding: '4px 24px 14px' }}>
          Download a copy of your data as a local file.
        </div>
        <SettingsGroup header="Datasets">
          {items.map((it, i) => (
            <button key={it.id} onClick={() => runExport(it.id)} disabled={busy === it.id} style={{
              display: 'flex', alignItems: 'center', gap: 14,
              width: '100%', padding: '13px 14px',
              background: 'transparent', border: 0, cursor: busy === it.id ? 'wait' : 'pointer', textAlign: 'left',
              borderBottom: i < items.length - 1 ? '0.5px solid var(--outline-variant)' : 0,
              opacity: busy && busy !== it.id ? 0.4 : 1,
            }}>
              <div style={{
                width: 30, height: 30, borderRadius: 8,
                background: 'var(--surface-container-high)',
                display: 'flex', alignItems: 'center', justifyContent: 'center',
              }}>
                <span className="msi" style={{ fontSize: 18, animation: busy === it.id ? 'jiggle 0.6s linear infinite' : 'none' }}>
                  {busy === it.id ? 'hourglass_top' : it.icon}
                </span>
              </div>
              <div style={{ flex: 1 }}>
                <div style={{ fontFamily: 'var(--font-sans)', fontSize: 14 }}>{it.label}</div>
                <div style={{ fontSize: 11, color: 'var(--on-surface-variant)', marginTop: 2 }}>{it.detail}</div>
              </div>
              <span className="msi" style={{ fontSize: 18, color: 'var(--outline)' }} data-icon="download"></span>
            </button>
          ))}
        </SettingsGroup>
        {lastMsg && (
          <div style={{ padding: '0 24px' }}>
            <div style={{
              padding: '10px 14px', borderRadius: 10,
              background: 'var(--surface-container-low)',
              fontSize: 12, color: 'var(--on-surface)', fontFamily: 'var(--font-sans)',
              display: 'flex', alignItems: 'center', gap: 8,
            }}>
              <span className="msi" style={{ fontSize: 16 }} data-icon="check_circle"></span>
              {lastMsg}
            </div>
          </div>
        )}
      </div>
    </div>
  );
};

      <div style={{ flex: 1, overflowY: 'auto', padding: '0 0 20px' }} className="no-scrollbar">

          <SettingsGroup key={g.header} header={g.header}>
            {g.items.map((it, i) => (
              <SettingsRow key={i} icon={it.icon} label={it.label} detail={it.detail} toggle={it.toggle}
                onClick={() => it.go && setSection(it.go)}
                tweaks={tweaks} setTweak={setTweak}
                last={i === g.items.length - 1} />
            ))}
          </SettingsGroup>
        ))}
      </div>
    </div>
  );
};

Object.assign(window, { MusicApp, DiaryApp, CalendarApp, ContactsApp, SettingsApp });

</script>

<script type="text/babel">

// ─────── WALLET ───────
const WALLET_GRADIENTS = [

  ['#4a3b2e', '#291f15'],

const WALLET_INITIAL = {
  myCards: [
    {
      id: 'me_main', primary: true, owner: 'me',
      label: 'Personal · Checking', last4: '4218',
      gradient: 0, balance: 2400.00, holderName: 'A. Mizuki',
    },
  ],
  charCards: [], // { id, charId, charName, label, last4, gradient, balance, type: 'shared'|'family' }
  pendingRequests: [], // { id, charId, charName, kind: 'family', date }
  transactions: [], // { id, type: 'sent'|'received'|'topup', amount, to/from, note, time }

const formatMoney = (n) => '¥' + (Math.round((n || 0) * 100) / 100).toLocaleString('en-US', { minimumFractionDigits: 2 });
const randomLast4 = () => Math.floor(1000 + Math.random() * 9000).toString();

};

const WalletApp = ({ onExit, wallet, setWallet, contacts }) => {
  const [focused, setFocused] = React.useState(null); // card id, or null
  const [createOpen, setCreateOpen] = React.useState(null); // 'me' | 'char' | null
  const [topUpFor, setTopUpFor] = React.useState(null); // card id
  const [topUpAmt, setTopUpAmt] = React.useState('');

  const allCards = [...wallet.myCards, ...wallet.charCards];
  const focusedCard = allCards.find(c => c.id === focused);

  const addMyCard = (label, balance, gradient) => {
    setWallet(w => ({
      ...w,
      myCards: [...w.myCards, {
        id: 'me_' + Date.now(), primary: w.myCards.length === 0, owner: 'me',
        label, last4: randomLast4(), gradient, balance: parseFloat(balance) || 0,
        holderName: 'A. Mizuki',
      }],
    }));
  };

  const addCharCard = (charId, charName, label, balance, gradient, type) => {
    setWallet(w => ({
      ...w,
      charCards: [...w.charCards, {
        id: 'char_' + Date.now(), charId, charName, label,
        last4: randomLast4(), gradient, balance: parseFloat(balance) || 0, type,
      }],
    }));
  };

  const requestFamilyCard = (charId, charName) => {
    setWallet(w => ({
      ...w,
      pendingRequests: [...(w.pendingRequests || []), {
        id: 'req_' + Date.now(), charId, charName, kind: 'family',
        date: new Date().toLocaleDateString(),
      }],
    }));
  };

  const resolveRequest = (reqId, accept) => {
    setWallet(w => {
      const req = (w.pendingRequests || []).find(r => r.id === reqId);
      const nextReqs = (w.pendingRequests || []).filter(r => r.id !== reqId);
      if (!accept || !req) return { ...w, pendingRequests: nextReqs };
      return {
        ...w,
        pendingRequests: nextReqs,
        charCards: [...w.charCards, {
          id: 'fam_' + Date.now(), charId: req.charId, charName: req.charName,
          label: req.charName + ' · Family', last4: randomLast4(),
          gradient: 3, balance: 0, type: 'family',
        }],
      };
    });
  };

  const topUp = () => {
    const amt = parseFloat(topUpAmt) || 0;
    if (amt <= 0 || !topUpFor) return;
    setWallet(w => ({
      ...w,
      myCards: w.myCards.map(c => c.id === topUpFor ? { ...c, balance: (c.balance || 0) + amt } : c),
      charCards: w.charCards.map(c => c.id === topUpFor ? { ...c, balance: (c.balance || 0) + amt } : c),
      transactions: [
        { id: 't' + Date.now(), type: 'topup', amount: amt, to: 'self', note: 'Top up', time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) },
        ...(w.transactions || []),
      ],
    }));
    setTopUpFor(null); setTopUpAmt('');
  };

  if (focusedCard) {
    return <WalletCardDetail
      card={focusedCard} onBack={() => setFocused(null)}
      onTopUp={() => setTopUpFor(focusedCard.id)}
      transactions={wallet.transactions || []}
    />;
  }

  return (
    <div style={{ display: 'flex', flexDirection: 'column', height: '100%', background: 'var(--surface)' }}>
      <div style={{
        display: 'flex', alignItems: 'center', justifyContent: 'space-between',
        padding: '14px 18px 8px',
      }}>
        <button onClick={onExit} style={iconBtn}>
          <span className="msi" style={{ fontSize: 22 }} data-icon="arrow_back_ios_new"></span>
        </button>
        <div style={{ fontFamily: 'var(--font-serif)', fontSize: 22, fontWeight: 700, fontStyle: 'italic' }}>Wallet</div>
        <button onClick={() => setCreateOpen('me')} style={iconBtn}>
          <span className="msi" style={{ fontSize: 22 }} data-icon="add"></span>
        </button>
      </div>

      <div style={{ flex: 1, overflowY: 'auto', padding: '0 18px 30px' }} className="no-scrollbar">
        {/* My cards */}
        <div style={{ fontSize: 10, letterSpacing: 0.22, textTransform: 'uppercase', color: 'var(--on-surface-variant)', fontWeight: 600, padding: '10px 4px 8px' }}>
          My cards
        </div>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
          {wallet.myCards.map(card => (
            <WalletCard key={card.id} card={card} onClick={() => setFocused(card.id)} />
          ))}
          <button onClick={() => setCreateOpen('me')} style={{
            padding: '14px', borderRadius: 14, border: '1.5px dashed var(--outline-variant)',
            background: 'transparent', cursor: 'pointer', color: 'var(--on-surface-variant)',
            fontFamily: 'var(--font-sans)', fontSize: 13, fontWeight: 500,
            display: 'inline-flex', alignItems: 'center', justifyContent: 'center', gap: 6,
          }}>
            <span className="msi" style={{ fontSize: 18 }} data-icon="add"></span>
            New personal card
          </button>
        </div>

        {/* Character cards */}
        <div style={{ fontSize: 10, letterSpacing: 0.22, textTransform: 'uppercase', color: 'var(--on-surface-variant)', fontWeight: 600, padding: '24px 4px 8px' }}>
          Character cards
        </div>
        {wallet.charCards.length === 0 ? (
          <div style={{
            padding: '14px 16px', borderRadius: 14, background: 'var(--surface-container-low)',
            fontSize: 12, color: 'var(--on-surface-variant)', fontStyle: 'italic',
          }}>
            Create a card for a character, or request a family card from their bank.
          </div>
        ) : (
          <div style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
            {wallet.charCards.map(card => (
              <WalletCard key={card.id} card={card} onClick={() => setFocused(card.id)} />
            ))}
          </div>
        )}
        <button onClick={() => setCreateOpen('char')} style={{
          marginTop: 14, padding: '14px', borderRadius: 14, border: '1.5px dashed var(--outline-variant)',
          background: 'transparent', cursor: 'pointer', color: 'var(--on-surface-variant)',
          fontFamily: 'var(--font-sans)', fontSize: 13, fontWeight: 500, width: '100%',
          display: 'inline-flex', alignItems: 'center', justifyContent: 'center', gap: 6,
        }}>
          <span className="msi" style={{ fontSize: 18 }} data-icon="credit_card"></span>
          New character card
        </button>

        {/* Pending requests */}
        {(wallet.pendingRequests || []).length > 0 && (
          <>
            <div style={{ fontSize: 10, letterSpacing: 0.22, textTransform: 'uppercase', color: 'var(--on-surface-variant)', fontWeight: 600, padding: '24px 4px 8px' }}>
              Family card requests
            </div>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
              {wallet.pendingRequests.map(r => (
                <div key={r.id} style={{
                  padding: 14, borderRadius: 14, background: 'var(--surface-container-low)',
                  border: '0.5px solid var(--outline-variant)',
                }}>
                  <div style={{ fontSize: 12, color: 'var(--on-surface)', lineHeight: 1.5 }}>
                    Requested family card from <b>{r.charName}</b> · <span style={{ color: 'var(--on-surface-variant)' }}>{r.date}</span>
                  </div>
                  <div style={{ display: 'flex', gap: 6, marginTop: 10 }}>
                    <button onClick={() => resolveRequest(r.id, true)} style={{
                      padding: '7px 14px', borderRadius: 9999, border: 0, cursor: 'pointer',
                      background: 'var(--on-surface)', color: 'var(--surface)',
                      fontSize: 11, fontWeight: 600, fontFamily: 'var(--font-sans)',
                    }}>Approve (demo)</button>
                    <button onClick={() => resolveRequest(r.id, false)} style={{
                      padding: '7px 14px', borderRadius: 9999, border: '0.5px solid var(--outline-variant)', cursor: 'pointer',
                      background: 'transparent', color: 'var(--on-surface-variant)',
                      fontSize: 11, fontFamily: 'var(--font-sans)',
                    }}>Dismiss</button>
                  </div>
                </div>
              ))}
            </div>
          </>
        )}

        {/* Recent transactions */}
        {(wallet.transactions || []).length > 0 && (
          <>
            <div style={{ fontSize: 10, letterSpacing: 0.22, textTransform: 'uppercase', color: 'var(--on-surface-variant)', fontWeight: 600, padding: '24px 4px 8px' }}>
              Recent activity
            </div>
            <div style={{ background: 'var(--surface-container-low)', borderRadius: 14, overflow: 'hidden' }}>
              {wallet.transactions.slice(0, 8).map((t, i) => (
                <div key={t.id} style={{
                  display: 'flex', alignItems: 'center', gap: 12, padding: '11px 14px',
                  borderTop: i === 0 ? 0 : '0.5px solid var(--outline-variant)',
                }}>
                  <div style={{
                    width: 30, height: 30, borderRadius: '50%',
                    background: t.type === 'sent' ? '#7a3a3a' : t.type === 'received' ? '#3a5a3a' : '#3a4a5a',
                    color: '#fff', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0,
                  }}>
                    <span className="msi" style={{ fontSize: 16 }} data-icon={
                      t.type === 'sent' ? 'arrow_outward' : t.type === 'received' ? 'south_west' : 'add'
                    }></span>
                  </div>
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ fontSize: 13, fontWeight: 500 }}>
                      {t.type === 'sent' ? `Sent to ${t.to}` : t.type === 'received' ? `From ${t.from}` : 'Top up'}
                    </div>
                    {t.note && <div style={{ fontSize: 11, color: 'var(--on-surface-variant)', marginTop: 1 }}>{t.note}</div>}
                  </div>
                  <div style={{ textAlign: 'right' }}>
                    <div style={{ fontSize: 13, fontWeight: 600, fontFamily: 'var(--font-serif)', color: t.type === 'sent' ? '#b4322a' : 'var(--on-surface)' }}>
                      {t.type === 'sent' ? '−' : '+'}{formatMoney(t.amount)}
                    </div>
                    <div style={{ fontSize: 10, color: 'var(--on-surface-variant)' }}>{t.time}</div>
                  </div>
                </div>
              ))}
            </div>
          </>
        )}
      </div>

      {createOpen === 'me' && (
        <CreatePersonalCardModal onClose={() => setCreateOpen(null)} onCreate={addMyCard} />
      )}
      {createOpen === 'char' && (
        <CreateCharCardModal
          onClose={() => setCreateOpen(null)}
          onCreate={addCharCard}
          onRequestFamily={requestFamilyCard}
          contacts={contacts || []}
        />
      )}
      {topUpFor && (
        <TopUpModal
          amount={topUpAmt} setAmount={setTopUpAmt}
          onClose={() => { setTopUpFor(null); setTopUpAmt(''); }}
          onConfirm={topUp}
        />
      )}
    </div>
  );
};

const WalletCardDetail = ({ card, onBack, onTopUp, transactions }) => (
  <div style={{ display: 'flex', flexDirection: 'column', height: '100%', background: 'var(--surface)' }}>
    <div style={{ display: 'flex', alignItems: 'center', gap: 6, padding: '12px 14px' }}>
      <button onClick={onBack} style={iconBtn}>
        <span className="msi" style={{ fontSize: 22 }} data-icon="arrow_back_ios_new"></span>
      </button>
      <div style={{ flex: 1, fontFamily: 'var(--font-serif)', fontSize: 17, fontWeight: 600, fontStyle: 'italic' }}>{card.label}</div>

          flex: 1, padding: '12px', borderRadius: 12, border: 0, cursor: 'pointer',

          {card.owner === 'me' ? 'Top up' : 'Add funds'}
        </button>
      </div>
      <div style={{ fontSize: 10, letterSpacing: 0.22, textTransform: 'uppercase', color: 'var(--on-surface-variant)', fontWeight: 600, marginBottom: 8 }}>

      <div style={{ background: 'var(--surface-container-low)', borderRadius: 14, overflow: 'hidden' }}>

              <div style={{ fontSize: 12 }}>
                {t.type === 'sent' ? `Sent to ${t.to}` : t.type === 'received' ? `From ${t.from}` : 'Top up'}
                {t.note ? <span style={{ color: 'var(--on-surface-variant)' }}> · {t.note}</span> : null}
              </div>
              <div style={{ fontSize: 13, fontWeight: 600, fontFamily: 'var(--font-serif)', color: t.type === 'sent' ? '#b4322a' : 'var(--on-surface)' }}>
                {t.type === 'sent' ? '−' : '+'}{formatMoney(t.amount)}
              </div>
            </div>
          ))
        )}
      </div>
    </div>
  </div>
);

    <ModalSheet title="New personal card" onClose={onClose}>
      <ModalInput label="Label" value={label} onChange={setLabel} placeholder="e.g. Personal · Savings" />

            }}>Request family card</button>
          </div>
          {mode === 'family-request' && (
            <div style={{ fontSize: 11, color: 'var(--on-surface-variant)', marginTop: 8, lineHeight: 1.5 }}>
              You'll send {selected?.name || 'them'} a request to add you to their family banking. They can approve from their bank app.
            </div>
          )}
        </div>

        {mode === 'shared' && <>
          <ModalInput label="Label" value={label} onChange={setLabel} placeholder="e.g. Hana · Shared" />
          <ModalInput label="Starting balance (¥)" value={balance} onChange={setBalance} placeholder="0.00" type="number" />
          <ModalGradientPicker value={gradient} onChange={setGradient} />
          <ModalButton onClick={() => {
            if (selected && label.trim()) { onCreate(selected.id, selected.name, label.trim(), balance, gradient, 'shared'); onClose(); }
          }} disabled={!label.trim() || !selected}>
            Create card
          </ModalButton>
        </>}
        {mode === 'family-request' && (
          <ModalButton onClick={() => {
            if (selected) { onRequestFamily(selected.id, selected.name); onClose(); }
          }} disabled={!selected}>
            Send family card request
          </ModalButton>
        )}
      </>)}
    </ModalSheet>
  );
};

const TopUpModal = ({ amount, setAmount, onClose, onConfirm }) => (
  <ModalSheet title="Top up" onClose={onClose}>
    <div style={{
      padding: 18, borderRadius: 14, background: 'var(--surface-container-low)',
      marginBottom: 14, textAlign: 'center',
    }}>
      <div style={{ fontSize: 10, letterSpacing: 0.22, textTransform: 'uppercase', color: 'var(--on-surface-variant)', fontWeight: 600 }}>Amount</div>
      <div style={{ display: 'inline-flex', alignItems: 'baseline', gap: 6, marginTop: 4 }}>
        <span style={{ fontFamily: 'var(--font-serif)', fontSize: 28, fontWeight: 600 }}>¥</span>
        <input
          autoFocus value={amount} onChange={e => setAmount(e.target.value.replace(/[^0-9.]/g, ''))}
          placeholder="0.00" inputMode="decimal"
          style={{
            background: 'transparent', border: 0, outline: 'none', width: 160, textAlign: 'center',
            fontFamily: 'var(--font-serif)', fontSize: 30, fontWeight: 600, color: 'var(--on-surface)',
          }}
        />
      </div>
    </div>
    <ModalButton onClick={onConfirm} disabled={!parseFloat(amount)}>Add funds</ModalButton>
  </ModalSheet>
);

const ModalSheet = ({ title, onClose, children }) => (
  <div onClick={onClose} style={{
    position: 'absolute', inset: 0, zIndex: 80,
    background: 'rgba(0,0,0,0.35)', display: 'flex', alignItems: 'flex-end',
  }}>
    <div onClick={e => e.stopPropagation()} style={{
      width: '100%', background: 'var(--surface)',
      borderTopLeftRadius: 20, borderTopRightRadius: 20,
      padding: '20px 18px 22px', maxHeight: '88%', overflowY: 'auto',
      animation: 'slideUp 220ms ease-out',
    }}>
      <div style={{ width: 32, height: 3, background: 'var(--outline-variant)', borderRadius: 2, margin: '0 auto 14px' }}/>
      <div style={{ fontFamily: 'var(--font-serif)', fontSize: 20, fontWeight: 600, fontStyle: 'italic', marginBottom: 14 }}>{title}</div>
      {children}
    </div>
  </div>
);

const ModalInput = ({ label, value, onChange, placeholder, type = 'text' }) => (
  <div style={{ marginBottom: 12 }}>
    <div style={{ fontSize: 10, letterSpacing: 0.2, textTransform: 'uppercase', color: 'var(--on-surface-variant)', fontWeight: 600, marginBottom: 6 }}>{label}</div>
    <input
      value={value} onChange={e => onChange(type === 'number' ? e.target.value.replace(/[^0-9.]/g, '') : e.target.value)}
      placeholder={placeholder} inputMode={type === 'number' ? 'decimal' : 'text'}
      style={{
        width: '100%', boxSizing: 'border-box', padding: '10px 12px', borderRadius: 10,
        border: '0.5px solid var(--outline-variant)', background: 'var(--surface)',
        fontFamily: 'var(--font-sans)', fontSize: 13, color: 'var(--on-surface)', outline: 'none',
      }}
    />
  </div>
);

const ModalGradientPicker = ({ value, onChange }) => (
  <div style={{ marginBottom: 14 }}>
    <div style={{ fontSize: 10, letterSpacing: 0.2, textTransform: 'uppercase', color: 'var(--on-surface-variant)', fontWeight: 600, marginBottom: 6 }}>Card color</div>
    <div style={{ display: 'flex', gap: 8 }}>
      {WALLET_GRADIENTS.map((g, i) => (
        <button key={i} onClick={() => onChange(i)} style={{
          width: 38, height: 38, borderRadius: 10, cursor: 'pointer', padding: 0,
          background: `linear-gradient(135deg, ${g[0]}, ${g[1]})`,
          border: value === i ? '2px solid var(--on-surface)' : '0.5px solid var(--outline-variant)',
        }}/>
      ))}
    </div>
  </div>
);

const ModalButton = ({ onClick, disabled, children }) => (
  <button onClick={onClick} disabled={disabled} style={{
    width: '100%', padding: '12px', borderRadius: 12, border: 0,
    cursor: disabled ? 'default' : 'pointer',
    background: disabled ? 'var(--surface-container)' : 'var(--on-surface)',
    color: disabled ? 'var(--outline)' : 'var(--surface)',
    fontFamily: 'var(--font-sans)', fontSize: 13, fontWeight: 600,
  }}>{children}</button>
);

const INITIAL_STATE = {
  profile: {
    name: 'ハナ',
    handle: '@angelica',
    badge: 'baby',
    subtitle: 'Curated Presence · I love you to the moon',
    avatar: null,
  },
  apps: ['messages', 'calendar', 'diary', 'camera', 'music', 'maps', 'vitals', 'wallet', 'contacts', 'settings', 'books', 'weather'],
  widgets: ['calendar', 'music'],
  photo: null,
  quote: 'Less, but better.',
};

function App() {
  const [tweaks, setTweaks] = React.useState(() => {
    try { return JSON.parse(localStorage.getItem('klp.tweaks')) || TWEAK_DEFAULTS; }
    catch { return TWEAK_DEFAULTS; }
  });
  const [state, setState] = React.useState(() => {
    try {
      const s = JSON.parse(localStorage.getItem('klp.state'));
      if (s && Array.isArray(s.apps)) {
        // Migrate: docs → wallet
        s.apps = s.apps.map(a => a === 'docs' ? 'wallet' : a);
        if (!s.apps.includes('wallet')) s.apps.push('wallet');
      }
      return s || INITIAL_STATE;
    } catch { return INITIAL_STATE; }
  });
  const [route, setRoute] = React.useState(() => localStorage.getItem('klp.route') || 'home');
  const [editMode, setEditMode] = React.useState(false);
  const [pendingChat, setPendingChat] = React.useState(null);
  const [contacts, setContactsState] = React.useState(() => {
    try { const s = JSON.parse(localStorage.getItem('klp_contacts') || 'null'); return Array.isArray(s) ? s : CONTACTS_SEED; }
    catch { return CONTACTS_SEED; }
  });
  const setContacts = (fn) => {
    setContactsState(prev => {
      const next = typeof fn === 'function' ? fn(prev) : fn;
      localStorage.setItem('klp_contacts', JSON.stringify(next));
      return next;
    });
  };
  const [conversations, setConversations] = React.useState(() => {
    try { const s = JSON.parse(localStorage.getItem('klp.conversations')); return Array.isArray(s) ? s : CONVERSATIONS_SEED; }
    catch { return CONVERSATIONS_SEED; }
  });
  React.useEffect(() => { localStorage.setItem('klp.conversations', JSON.stringify(conversations)); }, [conversations]);

  const [wallet, setWalletState] = React.useState(() => {
    try { const s = JSON.parse(localStorage.getItem('klp.wallet') || 'null'); return s || WALLET_INITIAL; }
    catch { return WALLET_INITIAL; }
  });
  const setWallet = (fn) => {
    setWalletState(prev => {
      const next = typeof fn === 'function' ? fn(prev) : fn;
      localStorage.setItem('klp.wallet', JSON.stringify(next));
      return next;
    });
  };

  // Persist
  React.useEffect(() => { localStorage.setItem('klp.tweaks', JSON.stringify(tweaks)); }, [tweaks]);
  React.useEffect(() => { localStorage.setItem('klp.state', JSON.stringify(state)); }, [state]);
  React.useEffect(() => { localStorage.setItem('klp.route', route); }, [route]);

  // Dark mode on root html
  React.useEffect(() => {
    document.documentElement.setAttribute('data-dark', tweaks.dark ? 'true' : 'false');
  }, [tweaks.dark]);

  const setTweak = (k, v) => setTweaks(t => {
    const next = { ...t, [k]: v };
    // notify host for persistence
    try { window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [k]: v } }, '*'); } catch {}
    return next;
  });

  // Tweaks protocol
  React.useEffect(() => {
    const h = (e) => {
      if (!e.data) return;
      if (e.data.type === '__activate_edit_mode') setEditMode(true);
      if (e.data.type === '__deactivate_edit_mode') setEditMode(false);
    };
    window.addEventListener('message', h);
    try { window.parent.postMessage({ type: '__edit_mode_available' }, '*'); } catch {}
    return () => window.removeEventListener('message', h);
  }, []);

  const launch = (id) => setRoute(id);
  const home = () => setRoute('home');

  let screen;
  switch (route) {
    case 'messages': screen = <MessagesApp onExit={home} initialChat={pendingChat} clearInitialChat={() => setPendingChat(null)} conversations={conversations} setConversations={setConversations} wallet={wallet} setWallet={setWallet} state={state} setState={setState} />; break;
    case 'music':    screen = <MusicApp onExit={home} />; break;
    case 'diary':    screen = <DiaryApp onExit={home} contacts={contacts} />; break;
    case 'calendar': screen = <CalendarApp onExit={home} contacts={contacts} />; break;
    case 'wallet':   screen = <WalletApp onExit={home} wallet={wallet} setWallet={setWallet} contacts={contacts} />; break;
    case 'contacts': screen = <ContactsApp onExit={home} onOpenMessage={(chat) => { setPendingChat(chat); setRoute('messages'); }} contacts={contacts} setContacts={setContacts} conversations={conversations} setConversations={setConversations} />; break;
    case 'settings': screen = <SettingsApp onExit={home} tweaks={tweaks} setTweak={setTweak} state={state} setState={setState} />; break;
    default:         screen = <HomeScreen tweaks={tweaks} onLaunch={launch} state={state} setState={setState} />;
  }

  const dark = tweaks.dark;

  return (
    <>
      <div className="phone-screen" data-screen-label={`Kitty Little Phone — ${route}`} style={{ background: dark ? '#0d0d0d' : 'var(--surface)' }}>
        <StatusBar dark={dark} />
        <div style={{ flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden', position: 'relative' }}>
          {screen}
        </div>
        {route !== 'home' && <HomeIndicator dark={dark} onHome={home} />}
      </div>
      {false && route !== 'home' && (
        <button onClick={home} className="edit-toggle" title="Back to home">
          <span className="msi" style={{ fontSize: 14 }} data-icon="home"></span>
          Home
        </button>
      )}
      <TweaksPanel tweaks={tweaks} setTweak={setTweak} visible={editMode} />
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
