                    flex: 1, padding: '4px', borderRadius: 6, border: 0, cursor: 'pointer',
                    background: 'rgba(255,255,255,0.2)', color: '#fff', fontFamily: 'var(--font-sans)', fontSize: 10,
                  }}>Cancel</button>
                </div>
              </div>
            ) : (
              <div onClick={() => { setDraftName(ME.name); setDraftHandle(ME.handle); setEditingName(true); }} style={{ cursor: 'pointer' }}>
                {ME.name}
                <div style={{
                  fontFamily: 'var(--font-sans)', fontSize: 10, fontWeight: 400,
                  opacity: 0.85, marginTop: 4, letterSpacing: 0.18, textTransform: 'uppercase',
                  display: 'inline-flex', alignItems: 'center', gap: 4,
                }}>{ME.handle} <span className="msi" style={{ fontSize: 12 }} data-icon="edit"></span></div>
              </div>
            )}
          </div>
          <button onClick={avatar.open} style={{
            width: 72, height: 72, borderRadius: 14, padding: 0, cursor: 'pointer', flexShrink: 0,
            border: '3px solid var(--surface)', background: 'var(--surface-container-high)',
            overflow: 'hidden', position: 'relative',
            boxShadow: '0 4px 14px rgba(0,0,0,0.18)',
          }}>
            {avatar.src
              ? <img src={avatar.src} style={{ width: '100%', height: '100%', objectFit: 'cover', display: 'block' }} />
              : <PhotoPlaceholder label={ME.name} tone="dark" style={{ borderRadius: 0 }} />
            }
            <span className="msi" style={{
              position: 'absolute', right: 4, bottom: 4,
              fontSize: 14, color: '#fff',
              background: 'rgba(0,0,0,0.55)', borderRadius: '50%', padding: 3,
            }} data-icon="edit"></span>
          </button>
          {avatar.input}
        </div>
      </div>

      {/* Compose entry */}
      <div style={{ padding: '0 16px 12px' }}>
        <button onClick={() => setComposerOpen(true)} style={{
          width: '100%', display: 'flex', alignItems: 'center', gap: 10,
          background: 'var(--surface-container-low)', border: 0, cursor: 'pointer',
          borderRadius: 9999, padding: '10px 14px', textAlign: 'left',
          color: 'var(--on-surface-variant)', fontFamily: 'var(--font-sans)', fontSize: 13,
        }}>
          <span className="msi" style={{ fontSize: 18 }} data-icon="edit"></span>
          <span style={{ flex: 1 }}>Share a moment...</span>
          <span className="msi" style={{ fontSize: 18, color: 'var(--primary)' }} data-icon="add_a_photo"></span>
        </button>
      </div>

      {/* Feed */}
      <div style={{ padding: '4px 16px 28px', display: 'flex', flexDirection: 'column', gap: 4 }}>
        {posts.map(p => (
          <MomentPost
            key={p.id} post={p}
            ME={ME}
            onLike={() => toggleLike(p.id)}
            onShowLikers={() => setLikersFor(p.id)}
            onComment={(text, replyTo) => addComment(p.id, text, replyTo)}
          />
        ))}
      </div>

      {composerOpen && (
        <MomentsComposer
          onClose={() => setComposerOpen(false)}
          onPost={(p) => { addPost(p); setComposerOpen(false); }}
        />
      )}

      {likersFor && (
        <LikersSheet
          likers={(posts.find(p => p.id === likersFor)?.likes) || []}
          onClose={() => setLikersFor(null)}
        />
      )}
    </div>
  );
};

const MomentPost = ({ post, onLike, onShowLikers, onComment, ME }) => {
  const [expanded, setExpanded] = React.useState(false);
  const [replyTo, setReplyTo] = React.useState(null);
  const [text, setText] = React.useState('');
  const liked = (post.likes || []).includes(ME.name);
  const likeCount = (post.likes || []).length;
  const commentCount = (post.commentList || []).length;

  const send = () => {
    const t = text.trim();
    if (!t) return;
    onComment(t, replyTo);
    setText(''); setReplyTo(null);
  };

  return (
    <div style={{
      display: 'flex', gap: 12, padding: '14px 0',
      borderBottom: '0.5px solid var(--outline-variant)',
    }}>
      <div style={{
        width: 38, height: 38, borderRadius: 8,
        background: 'var(--surface-container)',
        flexShrink: 0, overflow: 'hidden',
        border: '0.5px solid var(--outline-variant)',
      }}>
        <PhotoPlaceholder label={post.author} tone="dark" style={{ borderRadius: 0 }} />
      </div>
      <div style={{ flex: 1, minWidth: 0 }}>
        <div style={{
          fontFamily: 'var(--font-serif)', fontWeight: 700, fontSize: 14,
          color: 'var(--on-surface)',
        }}>{post.author}</div>
        {post.text && (
          <div style={{
            fontSize: 12, color: 'var(--on-surface)',
            marginTop: 4, lineHeight: 1.5,
          }}>{post.text}</div>
        )}
        {(post.images && post.images.length > 0) && (
          <div style={{
            marginTop: 8, display: 'grid',
            gridTemplateColumns: post.images.length === 1 ? '1fr' : 'repeat(3, 1fr)',
            gap: 4,
          }}>
            {post.images.map((img, i) => (
              <div key={i} style={{
                borderRadius: 10, overflow: 'hidden',
                aspectRatio: post.images.length === 1 ? '16/9' : '1/1',
              }}>
                {img.startsWith?.('data:')
                  ? <img src={img} style={{ width: '100%', height: '100%', objectFit: 'cover', display: 'block' }} />
                  : <PhotoPlaceholder label={img} tone="dark" style={{ borderRadius: 0 }} />}
              </div>
            ))}
          </div>
        )}

        {/* meta */}
        <div style={{
          display: 'flex', alignItems: 'center', gap: 8,
          marginTop: 10, fontSize: 10, color: 'var(--on-surface-variant)', flexWrap: 'wrap',
        }}>
          {post.location && <><span className="msi" style={{ fontSize: 12 }} data-icon="location_on"></span>{post.location}<span>·</span></>}
          <span>{post.time}</span>
          {post.audience && post.audience !== 'public' && (
            <><span>·</span><span className="msi" style={{ fontSize: 12 }}>{(AUDIENCES.find(a => a.id === post.audience) || {}).icon || 'public'}</span></>
          )}
        </div>

        {/* actions */}
        <div style={{
          marginTop: 10, display: 'flex', gap: 14,
          color: 'var(--on-surface-variant)', fontSize: 11,
        }}>
          <button onClick={onLike} style={{
            background: 'transparent', border: 0, padding: 0, cursor: 'pointer',
            display: 'inline-flex', alignItems: 'center', gap: 4,
            color: liked ? 'var(--primary)' : 'var(--on-surface-variant)',
          }}>
            <span className={`msi${liked ? ' fill' : ''}`} style={{ fontSize: 16 }} data-icon="favorite"></span>
            {likeCount > 0 && <span style={{ fontSize: 11 }}>{likeCount}</span>}
          </button>
          <button onClick={() => setExpanded(e => !e)} style={{
            background: 'transparent', border: 0, padding: 0, cursor: 'pointer',
            display: 'inline-flex', alignItems: 'center', gap: 4,
            color: expanded ? 'var(--primary)' : 'var(--on-surface-variant)',
          }}>
            <span className="msi" style={{ fontSize: 16 }} data-icon="chat_bubble_outline"></span>
            {commentCount > 0 && <span style={{ fontSize: 11 }}>{commentCount}</span>}
          </button>
        </div>

        {/* Likers strip */}
        {likeCount > 0 && (
          <button onClick={onShowLikers} style={{
            marginTop: 8, padding: '6px 10px', borderRadius: 8,
            background: 'var(--surface-container-low)', border: 0, cursor: 'pointer',
            display: 'flex', alignItems: 'center', gap: 6,
            fontSize: 11, color: 'var(--on-surface-variant)', textAlign: 'left',
          }}>
            <span className="msi fill" style={{ fontSize: 12, color: 'var(--primary)' }} data-icon="favorite"></span>
            <span style={{ color: 'var(--on-surface)', fontWeight: 500 }}>
              {(post.likes || []).slice(0, 3).join(', ')}{likeCount > 3 ? ` +${likeCount - 3}` : ''}
            </span>
          </button>
        )}

        {/* Comments expanded */}
        {expanded && (
          <div style={{
            marginTop: 10, background: 'var(--surface-container-low)',
            borderRadius: 12, padding: '10px 12px',
            display: 'flex', flexDirection: 'column', gap: 8,
          }}>
            {(post.commentList || []).length === 0 && (
              <div style={{ fontSize: 11, color: 'var(--on-surface-variant)', fontStyle: 'italic' }}>
                Be the first to comment.
              </div>
            )}
            {(post.commentList || []).map(c => (
              <div key={c.id} style={{ display: 'flex', alignItems: 'flex-start', gap: 8 }}>
                <div style={{
                  width: 22, height: 22, borderRadius: 6, flexShrink: 0, overflow: 'hidden',
                  background: 'var(--surface-container)', border: '0.5px solid var(--outline-variant)',
                }}>
                  <PhotoPlaceholder label={c.author} tone="dark" style={{ borderRadius: 0 }} />
                </div>
                <div style={{ flex: 1, minWidth: 0, fontSize: 11, lineHeight: 1.5 }}>
                  <span style={{ fontWeight: 700, color: 'var(--on-surface)' }}>{c.author}</span>
                  {c.replyTo && <span style={{ color: 'var(--on-surface-variant)' }}> reply to <span style={{ fontWeight: 600 }}>{c.replyTo}</span></span>}
                  <span style={{ color: 'var(--on-surface)' }}>: {c.text}</span>
                  <button onClick={() => setReplyTo(c.author)} style={{
                    background: 'transparent', border: 0, padding: 0, marginLeft: 8, cursor: 'pointer',
                    color: 'var(--primary)', fontSize: 10, fontWeight: 600,
                  }}>Reply</button>
                  <span style={{ color: 'var(--outline)', marginLeft: 8, fontSize: 10 }}>{c.time}</span>
                </div>
              </div>
            ))}
            {/* Composer */}
            <div style={{ display: 'flex', alignItems: 'center', gap: 6, marginTop: 4 }}>
              <input
                value={text} onChange={e => setText(e.target.value)}
                onKeyDown={e => { if (e.key === 'Enter') send(); }}
                placeholder={replyTo ? `Reply to ${replyTo}...` : 'Add a comment...'}
                style={{
                  flex: 1, background: 'var(--surface)', border: '0.5px solid var(--outline-variant)',
                  borderRadius: 9999, padding: '6px 12px', outline: 'none',
                  fontFamily: 'var(--font-sans)', fontSize: 11, color: 'var(--on-surface)',
                }}
              />
              {replyTo && (
                <button onClick={() => setReplyTo(null)} style={{
                  background: 'transparent', border: 0, cursor: 'pointer', padding: 4,
                  color: 'var(--on-surface-variant)',
                }}><span className="msi" style={{ fontSize: 16 }} data-icon="close"></span></button>
              )}
              <button onClick={send} disabled={!text.trim()} style={{
                background: text.trim() ? 'var(--primary)' : 'var(--surface-container)',
                color: text.trim() ? 'var(--on-primary)' : 'var(--outline)',
                border: 0, borderRadius: 9999, padding: '6px 12px', cursor: text.trim() ? 'pointer' : 'default',
                fontSize: 11, fontWeight: 600,
              }}>Send</button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
};

const MomentsComposer = ({ onClose, onPost }) => {
  const [text, setText] = React.useState('');
  const [images, setImages] = React.useState([]);
  const [audience, setAudience] = React.useState('friends');
  const [audOpen, setAudOpen] = React.useState(false);
  const [location, setLocation] = React.useState('');
  const [locOpen, setLocOpen] = React.useState(false);
  const fileRef = React.useRef();

  const onPickImages = (e) => {
    const files = [...(e.target.files || [])];
    files.forEach(f => {
      const r = new FileReader();
      r.onload = () => setImages(prev => [...prev, r.result]);
      r.readAsDataURL(f);
    });
  };

  const submit = () => {
    if (!text.trim() && images.length === 0) return;
    onPost({
      text: text.trim(), images, location: location || undefined,
      audience, likes: [], commentList: [],
    });
  };

  const aud = AUDIENCES.find(a => a.id === audience);

  return (
    <div style={{
      position: 'absolute', inset: 0, zIndex: 100,
      background: 'rgba(0,0,0,0.45)',
      display: 'flex', alignItems: 'flex-end',
      animation: 'fadeIn 0.18s ease',
    }}>
      <div style={{
        width: '100%', background: 'var(--surface)',
        borderTopLeftRadius: 22, borderTopRightRadius: 22,
        padding: '14px 16px 24px', display: 'flex', flexDirection: 'column', gap: 12,
        maxHeight: '92%', overflowY: 'auto',
      }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
          <button onClick={onClose} style={{
            background: 'transparent', border: 0, cursor: 'pointer',
            color: 'var(--on-surface-variant)', fontSize: 13, padding: 4,
          }}>Cancel</button>
          <div style={{ fontFamily: 'var(--font-serif)', fontSize: 16, fontWeight: 700 }}>New moment</div>
          <button onClick={submit} disabled={!text.trim() && images.length === 0} style={{
            background: (text.trim() || images.length) ? 'var(--primary)' : 'var(--surface-container)',
            color: (text.trim() || images.length) ? 'var(--on-primary)' : 'var(--outline)',
            border: 0, borderRadius: 9999, padding: '6px 14px',
            cursor: (text.trim() || images.length) ? 'pointer' : 'default',
            fontSize: 12, fontWeight: 700,
          }}>Post</button>
        </div>

        <textarea
          value={text} onChange={e => setText(e.target.value)}
          placeholder="What's on your mind?"
          rows={3}
          style={{
            border: 0, outline: 'none', resize: 'none',
            fontFamily: 'var(--font-sans)', fontSize: 14, color: 'var(--on-surface)',
            background: 'transparent', padding: '4px 0',
          }}
        />

        {/* Image grid */}
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 6 }}>
          {images.map((src, i) => (
            <div key={i} style={{ position: 'relative', aspectRatio: '1/1', borderRadius: 8, overflow: 'hidden' }}>
              <img src={src} style={{ width: '100%', height: '100%', objectFit: 'cover', display: 'block' }} />
              <button onClick={() => setImages(images.filter((_, j) => j !== i))} style={{
                position: 'absolute', top: 4, right: 4, width: 18, height: 18, borderRadius: '50%',
                background: 'rgba(0,0,0,0.6)', color: '#fff', border: 0, cursor: 'pointer',
                display: 'flex', alignItems: 'center', justifyContent: 'center',
              }}><span className="msi" style={{ fontSize: 12 }} data-icon="close"></span></button>
            </div>
          ))}
          {images.length < 9 && (
            <button onClick={() => fileRef.current?.click()} style={{
              aspectRatio: '1/1', borderRadius: 8,
              background: 'var(--surface-container-low)',
              border: '1px dashed var(--outline-variant)', cursor: 'pointer',
              display: 'flex', alignItems: 'center', justifyContent: 'center',
              color: 'var(--outline)',
            }}><span className="msi" style={{ fontSize: 22 }} data-icon="add"></span></button>
          )}
        </div>
        <input ref={fileRef} type="file" accept="image/*" multiple onChange={onPickImages} style={{ display: 'none' }} />

        {/* Options rows */}
        <div style={{ display: 'flex', flexDirection: 'column', gap: 2, marginTop: 4 }}>
          <button onClick={() => setLocOpen(o => !o)} style={composerRow}>
            <span className="msi" style={{ fontSize: 18, color: 'var(--on-surface-variant)' }} data-icon="location_on"></span>
            <span style={{ flex: 1, textAlign: 'left' }}>Location</span>
            <span style={{ color: location ? 'var(--on-surface)' : 'var(--outline)', fontSize: 12 }}>
              {location || 'None'}
            </span>
            <span className="msi" style={{ fontSize: 16, color: 'var(--outline)' }} data-icon="chevron_right"></span>
          </button>
          {locOpen && (
            <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6, padding: '4px 12px 8px' }}>
              {LOCATIONS_PRESET.map(l => (
                <button key={l} onClick={() => { setLocation(l === location ? '' : l); setLocOpen(false); }} style={{
                  padding: '5px 10px', borderRadius: 9999, fontSize: 11,
                  border: '0.5px solid var(--outline-variant)',
                  background: location === l ? 'var(--primary)' : 'transparent',
                  color: location === l ? 'var(--on-primary)' : 'var(--on-surface)',
                  cursor: 'pointer',
                }}>{l}</button>
              ))}
            </div>
          )}

          <button onClick={() => setAudOpen(o => !o)} style={composerRow}>
            <span className="msi" style={{ fontSize: 18, color: 'var(--on-surface-variant)' }}>{aud.icon}</span>
            <span style={{ flex: 1, textAlign: 'left' }}>Who can see</span>
            <span style={{ color: 'var(--on-surface)', fontSize: 12 }}>{aud.label}</span>
            <span className="msi" style={{ fontSize: 16, color: 'var(--outline)' }} data-icon="chevron_right"></span>
          </button>
          {audOpen && (
            <div style={{ display: 'flex', flexDirection: 'column', padding: '0 4px 4px' }}>
              {AUDIENCES.map(a => (
                <button key={a.id} onClick={() => { setAudience(a.id); setAudOpen(false); }} style={{
                  display: 'flex', alignItems: 'center', gap: 10, padding: '8px 12px',
                  background: audience === a.id ? 'var(--surface-container-low)' : 'transparent',
                  border: 0, borderRadius: 10, cursor: 'pointer', textAlign: 'left',
                }}>
                  <span className="msi" style={{ fontSize: 18, color: 'var(--on-surface-variant)' }}>{a.icon}</span>
                  <div style={{ flex: 1 }}>
                    <div style={{ fontSize: 13, color: 'var(--on-surface)', fontWeight: 500 }}>{a.label}</div>
                    <div style={{ fontSize: 10, color: 'var(--on-surface-variant)', marginTop: 1 }}>{a.desc}</div>
                  </div>
                  {audience === a.id && <span className="msi" style={{ fontSize: 18, color: 'var(--primary)' }} data-icon="check"></span>}
                </button>
              ))}
            </div>
          )}
        </div>
      </div>
    </div>
  );
};

const iconBtn = {

};

const MessagesApp = ({ onExit, initialChat, clearInitialChat, conversations, setConversations, wallet, setWallet, state, setState }) => {
  const [tab, setTab] = React.useState('chat');
  const [openChat, setOpenChat] = React.useState(initialChat || null);

  React.useEffect(() => {
    if (initialChat) {
      setOpenChat(initialChat);
      setTab('chat');
      clearInitialChat && clearInitialChat();
    }
  }, [initialChat]);

  // Always reflect latest store version of the open chat
  const liveChat = openChat ? (conversations.find(c => c.id === openChat.id) || openChat) : null;

  const persistMessages = (chatId, messages) => {
    setConversations(prev => {
      const exists = prev.find(c => c.id === chatId);
      if (!exists) return prev;
      const last = messages[messages.length - 1];
      const lastText = last
        ? (last.typing ? exists.lastMessage
          : last.text ? (last.from === 'me' ? 'You: ' + last.text : last.text)
          : last.kind === 'sticker' ? (last.from === 'me' ? 'You sent a sticker' : 'Sent a sticker')
          : last.kind === 'money' ? (last.from === 'me' ? 'You sent money' : 'Sent money')
          : last.image ? (last.from === 'me' ? 'You sent a photo' : 'Sent a photo')
          : exists.lastMessage)
        : exists.lastMessage;
      return prev.map(c => c.id === chatId
        ? { ...c, messages, lastMessage: lastText, time: 'Now', unread: false }
        : c
      );
    });
  };

  if (liveChat) {
    return <ChatDetail chat={liveChat} onBack={() => setOpenChat(null)} onPersist={persistMessages} wallet={wallet} setWallet={setWallet} />;
  }

  return (
    <div style={{ display: 'flex', flexDirection: 'column', height: '100%' }}>
      <div style={{ flex: 1, overflowY: 'auto' }} className="no-scrollbar">
        {tab === 'chat' && <ConversationsList conversations={conversations} setConversations={setConversations} onOpenChat={setOpenChat} />}
        {tab === 'moments' && <MomentsFeed state={state} setState={setState} />}
        {tab === 'settings' && <MessagesSettings onExit={onExit} />}
      </div>
      <TabBar
        active={tab} onChange={setTab}
        tabs={[
          { id: 'chat', label: 'Chat', icon: 'chat' },
          { id: 'moments', label: 'Moments', icon: 'auto_stories' },
          { id: 'settings', label: 'Settings', icon: 'settings' },
        ]}
      />
    </div>
  );
};

Object.assign(window, { MessagesApp });

const CalendarApp = ({ onExit, contacts }) => {
  const characters = (contacts && contacts.length > 0) ? contacts : [{ id: 'hana', name: 'ハナ', sub: 'Hana', role: 'Photographer' }];
  const [selected, setSelected] = React.useState(new Date());

  const [pickerOpen, setPickerOpen] = React.useState(false);
  const [eventsByDate, setEventsByDate] = React.useState({}); // key: `${charId}-${year}-${month}-${day}`
  const [generating, setGenerating] = React.useState(false);

  const year = selected.getFullYear();
  const month = selected.getMonth();
  const monthName = selected.toLocaleDateString('en-US', { month: 'long' });
  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const days = [];
  for (let i = 0; i < firstDay; i++) days.push(null);
  for (let d = 1; d <= daysInMonth; d++) days.push(d);

  const character = characters.find(c => c.id === charId) || characters[0] || { id: charId, name: charId, sub: charId };
  const dayKey = `${charId}-${year}-${month}-${selected.getDate()}`;
  const todaysEvents = eventsByDate[dayKey] || [];

  const hasEventFor = (d) => !!eventsByDate[`${charId}-${year}-${month}-${d}`];

  const generateSchedule = () => {
    setGenerating(true);
    setTimeout(() => {
      const shortIdCal = charId ? charId.replace(/^seed_/, '') : 'hana';
      const pool = SCHEDULE_POOL[charId] || SCHEDULE_POOL[shortIdCal] || SCHEDULE_POOL.hana;

      const count = 3 + Math.floor(Math.random() * 3);
      const picks = [...pool].sort(() => Math.random() - 0.5).slice(0, count)
        .sort((a, b) => a.time.localeCompare(b.time));
      setEventsByDate(s => ({ ...s, [dayKey]: picks }));
      setGenerating(false);
    }, 900);
  };

      </div>
      <div style={{ padding: '0 14px' }}>
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(7, 1fr)', gap: 2, marginBottom: 6 }}>
          {['S','M','T','W','T','F','S'].map((d, i) => (
            <div key={i} style={{ textAlign: 'center', fontSize: 10, color: 'var(--on-surface-variant)', letterSpacing: 0.18, textTransform: 'uppercase', padding: '4px 0' }}>{d}</div>
          ))}
        </div>
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(7, 1fr)', gap: 2 }}>
          {days.map((d, i) => {
            const isSelected = d === selected.getDate();
            const hasEvent = d && hasEventFor(d);
            return (
              <button key={i} disabled={!d} onClick={() => d && setSelected(new Date(year, month, d))} style={{
                aspectRatio: '1/1', border: 0, cursor: d ? 'pointer' : 'default',
                background: isSelected ? 'var(--primary)' : 'transparent',
                color: isSelected ? 'var(--on-primary)' : 'var(--on-surface)',
                borderRadius: 10, fontFamily: 'var(--font-serif)', fontSize: 14, fontWeight: 500,
                position: 'relative', padding: 0,
              }}>
                {d}
                {hasEvent && !isSelected && (
                  <div style={{ position: 'absolute', bottom: 5, left: '50%', transform: 'translateX(-50%)', width: 3, height: 3, borderRadius: '50%', background: 'var(--primary)' }} />

              </button>
            );
          })}
        </div>
      </div>

      <div style={{ flex: 1, overflowY: 'auto', padding: '18px 20px 100px' }} className="no-scrollbar">
        <div style={{
          fontSize: 10, letterSpacing: 0.22, textTransform: 'uppercase',
          color: 'var(--on-surface-variant)', marginBottom: 10, fontWeight: 600,
          display: 'flex', justifyContent: 'space-between',
        }}>
          <span>{selected.toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric' })}</span>
          <span>{character.name}'s day</span>
        </div>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
          {todaysEvents.map((ev, i) => (
            <div key={i} style={{
              display: 'flex', gap: 14, padding: 14,
              background: 'var(--surface-container-lowest)', borderRadius: 14,
              border: '0.5px solid var(--outline-variant)',
            }}>
              <div style={{ fontFamily: 'var(--font-serif)', fontSize: 16, fontWeight: 600, minWidth: 50 }}>{ev.time}</div>
              <div style={{ flex: 1, borderLeft: '1px solid var(--outline-variant)', paddingLeft: 14 }}>
                <div style={{ fontFamily: 'var(--font-sans)', fontSize: 13, fontWeight: 600 }}>{ev.title}</div>
                <div style={{ fontSize: 11, color: 'var(--on-surface-variant)', marginTop: 2 }}>{ev.loc}</div>
              </div>
            </div>
          ))}
          {!todaysEvents.length && (
            <div style={{
              fontSize: 12, color: 'var(--on-surface-variant)', textAlign: 'center',
              padding: '40px 20px', border: '1px dashed var(--outline-variant)',
              borderRadius: 14, fontFamily: 'var(--font-sans)',
            }}>
              <div style={{ fontFamily: 'var(--font-serif)', fontSize: 15, fontStyle: 'italic', color: 'var(--on-surface)', marginBottom: 6 }}>A blank day.</div>
              Tap the sparkle to generate {character.name}'s schedule.
            </div>
          )}
        </div>
      </div>

      {/* Floating generate button */}
      <button onClick={generateSchedule} disabled={generating} title={`Generate schedule for ${character.name}`} style={{
        position: 'absolute', bottom: 24, right: 20, zIndex: 20,
        width: 56, height: 56, borderRadius: '50%', border: 0, cursor: generating ? 'wait' : 'pointer',
        background: 'var(--primary)', color: 'var(--on-primary)',
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        boxShadow: '0 8px 24px rgba(0,0,0,0.25)',
        transition: 'transform 0.2s',
        transform: generating ? 'scale(0.94)' : 'scale(1)',
      }}>
        <span className="msi" style={{ fontSize: 26, animation: generating ? 'jiggle 0.6s linear infinite' : 'none' }} data-icon="auto_awesome"></span>
      </button>
    </div>
  );
};

const GENRE_OPTIONS = ['Indie', 'City pop', 'Shoegaze', 'Ambient', 'Lo-fi', 'Jazz', 'Classical', 'Hip-hop', 'Electronic', 'Folk', 'R&B', 'Post-rock', 'K-pop', 'J-rock', 'Bossa nova'];

const CharacterWizard = ({ onClose, onSave, initial }) => {
  const [step, setStep] = React.useState(1);
  const [draft, setDraft] = React.useState(() => initial || {
    id: 'c_' + Date.now(),
    name: '', handle: '', avatar: null,
    about: '', backstory: '',
    occupation: 'Working',
    genres: [], musicUse: '',
    history: null, // null = fresh, or { duration, good, hard, moments }
    voiceId: '',
    role: '',
  });
  const fileRef = React.useRef(null);
  const set = (k, v) => setDraft(d => ({ ...d, [k]: v }));

  const onFile = (e) => {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    const r = new FileReader();
    r.onload = () => set('avatar', r.result);
    r.readAsDataURL(file);
    e.target.value = '';
  };

  const toggleGenre = (g) => set('genres', draft.genres.includes(g) ? draft.genres.filter(x => x !== g) : [...draft.genres, g]);

  const canNext = () => {
    if (step === 1) return (draft.name || '').trim().length > 0;
    return true;
  };

  const totalSteps = 6;

  const inputStyle = {
    width: '100%', fontFamily: 'var(--font-sans)', fontSize: 14,
    padding: '10px 12px', border: '0.5px solid var(--outline-variant)', borderRadius: 10,
    background: 'var(--surface)', color: 'var(--on-surface)', outline: 'none',
    boxSizing: 'border-box',

  const labelStyle = {
    fontSize: 10, fontFamily: 'var(--font-sans)', fontWeight: 600,
    color: 'var(--on-surface-variant)', letterSpacing: 0.22, textTransform: 'uppercase',
    marginBottom: 6, display: 'block',
  };
  const hintStyle = { fontSize: 11, color: 'var(--on-surface-variant)', fontStyle: 'italic', marginTop: 6 };

  const stepTitles = ['The face', 'Who they are', 'Their life', 'Music', 'Us', 'Their voice'];

  return (
    <div style={{
      position: 'absolute', inset: 0, background: 'var(--surface)',
      zIndex: 50, display: 'flex', flexDirection: 'column',
      animation: 'fadeIn 0.2s ease',
    }}>
      {/* Header */}
      <div style={{ padding: '12px 14px 10px', borderBottom: '0.5px solid var(--outline-variant)', display: 'flex', alignItems: 'center', gap: 8 }}>
        <button onClick={onClose} style={{ ...iconBtn2 }}>
          <span className="msi" style={{ fontSize: 22 }} data-icon="close"></span>
        </button>
        <div style={{ flex: 1 }}>
          <div style={{ fontFamily: 'var(--font-serif)', fontSize: 18, fontWeight: 600 }}>New character</div>
          <div style={{ fontSize: 10, letterSpacing: 0.2, color: 'var(--on-surface-variant)', textTransform: 'uppercase', marginTop: 2 }}>
            Step {step} of {totalSteps} · {stepTitles[step - 1]}
          </div>
        </div>
      </div>

      {/* Progress */}
      <div style={{ display: 'flex', gap: 3, padding: '0 16px 12px' }}>
        {Array.from({ length: totalSteps }).map((_, i) => (
          <div key={i} style={{
            flex: 1, height: 3, borderRadius: 3,
            background: i < step ? 'var(--primary)' : 'var(--surface-container-high)',
            transition: 'background 0.2s',
          }} />
        ))}
      </div>

      {/* Body */}
      <div style={{ flex: 1, overflowY: 'auto', padding: '8px 20px 24px' }} className="no-scrollbar">

        {step === 1 && (
          <div>
            <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', padding: '12px 0 18px' }}>
              <div style={{
                width: 110, height: 110, borderRadius: '50%', overflow: 'hidden',
                background: 'var(--surface-container-high)',
                border: '0.5px solid var(--outline-variant)',
              }}>
                {draft.avatar ? (
                  <img src={draft.avatar} alt="" style={{ width: '100%', height: '100%', objectFit: 'cover' }} />
                ) : (
                  <PhotoPlaceholder label={draft.name || '?'} tone="dark" style={{ borderRadius: 0 }} />
                )}
              </div>
              <input ref={fileRef} type="file" accept="image/*" onChange={onFile} style={{ display: 'none' }} />
              <button onClick={() => fileRef.current && fileRef.current.click()} style={{
                marginTop: 12, padding: '8px 16px', borderRadius: 9999,
                border: '0.5px solid var(--outline-variant)', background: 'var(--surface-container-lowest)',
                fontSize: 11, fontFamily: 'var(--font-sans)', cursor: 'pointer', color: 'var(--on-surface)',
                display: 'inline-flex', alignItems: 'center', gap: 5, fontWeight: 600,
              }}>
                <span className="msi" style={{ fontSize: 14 }} data-icon="photo_camera"></span>
                {draft.avatar ? 'Replace photo' : 'Upload photo'}
              </button>
            </div>
            <label style={labelStyle}>Name</label>
            <input value={draft.name} onChange={e => set('name', e.target.value)} placeholder="What do you call them?" style={inputStyle} autoFocus />
            <div style={hintStyle}>A single name, a nickname, or how they sign their texts.</div>
          </div>
        )}

        {step === 2 && (
          <div>
            <label style={labelStyle}>Who are they?</label>
            <textarea value={draft.about} onChange={e => set('about', e.target.value)} rows={7}
              placeholder="Personality, vibe, energy, quirks. The way they laugh. The way they go quiet."
              style={areaStyle} />
            <div style={hintStyle}>The more you write, the more real they become.</div>

            <div style={{ height: 18 }} />
            <label style={labelStyle}>Backstory</label>
            <textarea value={draft.backstory} onChange={e => set('backstory', e.target.value)} rows={6}
              placeholder="Where they're from. What shaped them. What they carry."
              style={areaStyle} />
          </div>
        )}

        {step === 3 && (
          <div>
            <label style={labelStyle}>Occupation</label>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
              {['Student', 'Working', 'Freelance', `Doesn't work`].map(o => (
                <button key={o} onClick={() => set('occupation', o)} style={{
                  display: 'flex', alignItems: 'center', gap: 10,
                  padding: '12px 14px', borderRadius: 12,
                  border: `0.5px solid ${draft.occupation === o ? 'var(--primary)' : 'var(--outline-variant)'}`,
                  background: draft.occupation === o ? 'color-mix(in srgb, var(--primary) 8%, var(--surface))' : 'var(--surface-container-lowest)',
                  cursor: 'pointer', textAlign: 'left',
                  fontSize: 14, fontFamily: 'var(--font-sans)',
                  color: 'var(--on-surface)', fontWeight: draft.occupation === o ? 600 : 400,
                }}>
                  <div style={{
                    width: 16, height: 16, borderRadius: '50%',
                    border: `1.5px solid ${draft.occupation === o ? 'var(--primary)' : 'var(--outline)'}`,
                    display: 'flex', alignItems: 'center', justifyContent: 'center',
                  }}>
                    {draft.occupation === o && <div style={{ width: 8, height: 8, borderRadius: '50%', background: 'var(--primary)' }} />}
                  </div>
                  {o}
                </button>
              ))}
            </div>
            <div style={hintStyle}>That's it. Routines, hobbies, sleep — the rest gets inferred silently.</div>
          </div>
        )}

        {step === 4 && (
          <div>
            <label style={labelStyle}>Genres they like</label>
            <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6 }}>
              {GENRE_OPTIONS.map(g => {
                const on = draft.genres.includes(g);
                return (
                  <button key={g} onClick={() => toggleGenre(g)} style={{
                    padding: '7px 12px', borderRadius: 9999,
                    border: `0.5px solid ${on ? 'var(--primary)' : 'var(--outline-variant)'}`,
                    background: on ? 'var(--primary)' : 'var(--surface-container-lowest)',
                    color: on ? 'var(--on-primary)' : 'var(--on-surface)',
                    fontSize: 12, fontFamily: 'var(--font-sans)', fontWeight: on ? 600 : 400,
                    cursor: 'pointer',
                  }}>{g}</button>
                );
              })}
            </div>

            <div style={{ height: 18 }} />
            <label style={labelStyle}>How do they use music?</label>
            <textarea value={draft.musicUse} onChange={e => set('musicUse', e.target.value)} rows={5}
              placeholder={'Sends songs instead of saying how she feels.\nLoops one track on hard days.\nMakes playlists for people she misses.'}
              style={areaStyle} />
          </div>
        )}

        {step === 5 && (
          <div>
            <label style={labelStyle}>Us</label>
            <div style={{ display: 'flex', gap: 6, marginBottom: 8 }}>
              {[{ k: null, l: 'Starting fresh' }, { k: 'history', l: 'We have history' }].map(o => {
                const on = (draft.history === null && o.k === null) || (draft.history && o.k === 'history');
                return (
                  <button key={o.l} onClick={() => set('history', o.k === null ? null : (draft.history || { duration: '', good: '', hard: '', moments: '' }))} style={{
                    flex: 1, padding: '12px 10px', borderRadius: 12,
                    border: `0.5px solid ${on ? 'var(--primary)' : 'var(--outline-variant)'}`,
                    background: on ? 'color-mix(in srgb, var(--primary) 8%, var(--surface))' : 'var(--surface-container-lowest)',
                    fontSize: 13, fontFamily: 'var(--font-sans)', fontWeight: on ? 600 : 400,
                    cursor: 'pointer', color: 'var(--on-surface)',
                  }}>{o.l}</button>
                );
              })}
            </div>

            {draft.history && (
              <div style={{ display: 'flex', flexDirection: 'column', gap: 14, marginTop: 8 }}>
                <div>
                  <label style={labelStyle}>How long?</label>
                  <input value={draft.history.duration} onChange={e => set('history', { ...draft.history, duration: e.target.value })}
                    placeholder="Two years. Since college. On and off since —" style={{ ...inputStyle, fontSize: 13 }} />
                </div>
                <div>
                  <label style={labelStyle}>What's been good</label>
                  <textarea value={draft.history.good} onChange={e => set('history', { ...draft.history, good: e.target.value })} rows={3}
                    placeholder="The inside jokes. The quiet mornings. The way they show up." style={areaStyle} />
                </div>
                <div>
                  <label style={labelStyle}>What's been hard</label>
                  <textarea value={draft.history.hard} onChange={e => set('history', { ...draft.history, hard: e.target.value })} rows={3}
                    placeholder="The fights you keep having. The thing you can't quite say." style={areaStyle} />
                </div>
                <div>
                  <label style={labelStyle}>Moments that mattered</label>
                  <textarea value={draft.history.moments} onChange={e => set('history', { ...draft.history, moments: e.target.value })} rows={3}
                    placeholder="That night in November. The letter. The song." style={areaStyle} />
                </div>
              </div>
            )}
            <div style={hintStyle}>Optional — but this is where conversations start to feel real.</div>
          </div>
        )}

        {step === 6 && (
          <div>
            <label style={labelStyle}>MiniMax voice ID</label>
            <input value={draft.voiceId} onChange={e => set('voiceId', e.target.value)} placeholder="Paste a voice ID or leave blank" style={{ ...inputStyle, fontFamily: 'ui-monospace, SFMono-Regular, Menlo, monospace', fontSize: 12 }} />
            <div style={hintStyle}>
              Optional. Without a voice ID, this character sends text only.
              Configure your Minimax API in Settings → Voice API first.
            </div>
          </div>
        )}

      </div>

      {/* Footer nav */}
      <div style={{
        padding: '10px 16px 16px', borderTop: '0.5px solid var(--outline-variant)',
        display: 'flex', gap: 8,
      }}>
        {step > 1 && (
          <button onClick={() => setStep(s => s - 1)} style={{
            padding: '12px 18px', borderRadius: 12,
            border: '0.5px solid var(--outline-variant)', background: 'var(--surface-container-lowest)',
            fontSize: 13, fontWeight: 600, cursor: 'pointer', color: 'var(--on-surface)',
          }}>Back</button>
        )}
        {step < totalSteps ? (
          <button onClick={() => canNext() && setStep(s => s + 1)} disabled={!canNext()} style={{
            flex: 1, padding: '12px', borderRadius: 12, border: 0,
            background: canNext() ? 'var(--primary)' : 'var(--surface-container)',
            color: canNext() ? 'var(--on-primary)' : 'var(--outline)',
            fontSize: 13, fontWeight: 700, cursor: canNext() ? 'pointer' : 'default',
            display: 'inline-flex', alignItems: 'center', justifyContent: 'center', gap: 6,
          }}>Continue <span className="msi" style={{ fontSize: 16 }} data-icon="arrow_forward"></span></button>
        ) : (
          <button onClick={() => onSave(draft)} style={{
            flex: 1, padding: '12px', borderRadius: 12, border: 0,
            background: 'var(--primary)', color: 'var(--on-primary)',
            fontSize: 13, fontWeight: 700, cursor: 'pointer',
            display: 'inline-flex', alignItems: 'center', justifyContent: 'center', gap: 6,
          }}><span className="msi" style={{ fontSize: 16 }} data-icon="check"></span>Save character</button>
        )}
      </div>
    </div>
  );
};

const ContactsApp = ({ onExit, onOpenMessage, contacts: propContacts, setContacts: propSetContacts, conversations, setConversations }) => {
  // Use prop-driven contacts if provided (so App-level store is shared), else local
  const [localContacts, localSetContacts] = React.useState(() => {
    try { const s = JSON.parse(localStorage.getItem('klp_contacts') || 'null'); return s || CONTACTS_SEED; } catch { return CONTACTS_SEED; }
  });
  const contacts = propContacts || localContacts;
  const setContacts = (fn) => {
    const next = typeof fn === 'function' ? fn(contacts) : fn;
    localSetContacts(next);
    propSetContacts && propSetContacts(next);
    localStorage.setItem('klp_contacts', JSON.stringify(next));
  };

  const [selected, setSelected] = React.useState(null);
  const [wizard, setWizard] = React.useState(null);
  const [editing, setEditing] = React.useState(null);
  const [confirmDelete, setConfirmDelete] = React.useState(null);

  const saveChar = (c) => {
    setContacts(prev => {
      const exists = prev.find(p => p.id === c.id);
      return exists ? prev.map(p => p.id === c.id ? c : p) : [...prev, c];
    });
    setWizard(null);
    setEditing(null);
  };

  const deleteChar = (c) => {
    setContacts(prev => prev.filter(p => p.id !== c.id));
    // Remove their conversation too
    setConversations && setConversations(prev => prev.filter(cv => cv.id !== c.id));
    setConfirmDelete(null);
    setSelected(null);
    setEditing(null);
  };

  const openMessage = (c) => {
    // Find-or-create a conversation for this character
    const existing = conversations.find(cv => cv.id === c.id);
    if (existing) { onOpenMessage && onOpenMessage(existing); return; }
    const chat = {
      id: c.id,
      name: c.name,
      avatar: c.avatar || null,
      avatarTone: c.avatarTone || 'a',
      lastMessage: 'Say hi to ' + (c.name || 'them'),
      time: 'Now',
      messages: [],
    };
    setConversations(prev => [chat, ...prev]);
    onOpenMessage && onOpenMessage(chat);
  };

  if (wizard === 'new') {
    return <CharacterWizard onClose={() => setWizard(null)} onSave={saveChar} />;
  }
  if (editing) {
    return <CharacterEdit contact={editing} onClose={() => setEditing(null)} onSave={saveChar} onDelete={() => setConfirmDelete(editing)} />;
  }
  if (confirmDelete) {
    return (
      <div style={{ display: 'flex', flexDirection: 'column', height: '100%', alignItems: 'center', justifyContent: 'center', padding: 32 }}>
        <span className="msi" style={{ fontSize: 48, color: 'var(--outline)', marginBottom: 16 }} data-icon="person_off"></span>
        <div style={{ fontFamily: 'var(--font-serif)', fontSize: 22, fontWeight: 600, fontStyle: 'italic', textAlign: 'center', marginBottom: 10 }}>
          Delete {confirmDelete.name}?
        </div>
        <div style={{ fontSize: 12, color: 'var(--on-surface-variant)', lineHeight: 1.6, textAlign: 'center', marginBottom: 24, maxWidth: 280 }}>
          This removes them from Contacts, Diary, Calendar, and their chat history. This cannot be undone.
        </div>
        <div style={{ display: 'flex', gap: 10, width: '100%' }}>
          <button onClick={() => setConfirmDelete(null)} style={{
            flex: 1, padding: '12px', borderRadius: 12, border: '0.5px solid var(--outline-variant)',
            background: 'transparent', fontFamily: 'var(--font-sans)', fontSize: 13, cursor: 'pointer',
          }}>Cancel</button>
          <button onClick={() => deleteChar(confirmDelete)} style={{
            flex: 1, padding: '12px', borderRadius: 12, border: 0,
            background: '#b4322a', color: '#fff', fontFamily: 'var(--font-sans)', fontSize: 13, fontWeight: 600, cursor: 'pointer',
          }}>Delete</button>
        </div>
      </div>
    );
  }

  if (selected) {
    const c = contacts.find(x => x.id === selected.id) || selected;
    return (
      <div style={{ display: 'flex', flexDirection: 'column', height: '100%' }}>
        <AppBar title="" onBack={() => setSelected(null)} right={
          <button onClick={() => setEditing(c)} style={iconBtn2}>
            <span className="msi" style={{ fontSize: 20 }} data-icon="edit"></span>
          </button>
        } />
        <div style={{ flex: 1, overflowY: 'auto', padding: '0 20px 20px' }} className="no-scrollbar">
          <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 12, padding: '10px 0 18px' }}>
            <div style={{
              width: 110, height: 110, borderRadius: '50%', overflow: 'hidden',
              background: 'var(--surface-container)', border: '0.5px solid var(--outline-variant)',
            }}>
              {c.avatar ? (
                <img src={c.avatar} alt="" style={{ width: '100%', height: '100%', objectFit: 'cover' }} />
              ) : (
                <PhotoPlaceholder label={c.name} tone="dark" style={{ borderRadius: 0 }} />
              )}
            </div>
            <div style={{ textAlign: 'center' }}>
              <div style={{ fontFamily: 'var(--font-serif)', fontSize: 26, fontWeight: 600 }}>{c.name}</div>
              <div style={{ fontSize: 12, color: 'var(--on-surface-variant)', marginTop: 2 }}>
                {[c.handle, c.role || c.occupation].filter(Boolean).join(' · ')}
              </div>
            </div>
            <div style={{ display: 'flex', gap: 10, marginTop: 6 }}>
              {[{ i: 'chat', l: 'Message' }, { i: 'call', l: 'Call' }, { i: 'videocam', l: 'Video' }].map(a => (
                <button key={a.i} onClick={a.i === 'chat' ? () => openMessage(c) : undefined} style={{
                  display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 4,
                  padding: '10px 14px', borderRadius: 12,
                  background: 'var(--surface-container-low)',
                  border: '0.5px solid var(--outline-variant)',
                  cursor: 'pointer', minWidth: 64,
                }}>
                  <span className="msi" style={{ fontSize: 20 }}>{a.i}</span>
                  <span style={{ fontSize: 9, letterSpacing: 0.18, textTransform: 'uppercase' }}>{a.l}</span>
                </button>
              ))}
            </div>
          </div>

          {c.about && (
            <div style={{ padding: '14px 0', borderTop: '0.5px solid var(--outline-variant)' }}>
              <div style={{ fontSize: 10, letterSpacing: 0.22, textTransform: 'uppercase', color: 'var(--on-surface-variant)', marginBottom: 6 }}>About</div>
              <div style={{ fontSize: 13, lineHeight: 1.55, whiteSpace: 'pre-wrap' }}>{c.about}</div>
            </div>
          )}
          {c.backstory && (
            <div style={{ padding: '14px 0', borderTop: '0.5px solid var(--outline-variant)' }}>
              <div style={{ fontSize: 10, letterSpacing: 0.22, textTransform: 'uppercase', color: 'var(--on-surface-variant)', marginBottom: 6 }}>Backstory</div>
              <div style={{ fontSize: 13, lineHeight: 1.55, whiteSpace: 'pre-wrap' }}>{c.backstory}</div>
            </div>
          )}
          {(c.occupation || c.genres?.length > 0) && (
            <div style={{ padding: '14px 0', borderTop: '0.5px solid var(--outline-variant)' }}>
              <div style={{ fontSize: 10, letterSpacing: 0.22, textTransform: 'uppercase', color: 'var(--on-surface-variant)', marginBottom: 6 }}>Life</div>
              {c.occupation && <div style={{ fontSize: 13, marginBottom: 4 }}>{c.occupation}</div>}
              {c.genres?.length > 0 && (
                <div style={{ display: 'flex', flexWrap: 'wrap', gap: 4, marginTop: 6 }}>
                  {c.genres.map(g => (
                    <span key={g} style={{ padding: '3px 10px', borderRadius: 9999, background: 'var(--surface-container-low)', fontSize: 10, border: '0.5px solid var(--outline-variant)' }}>{g}</span>
                  ))}
                </div>
              )}
              {c.musicUse && <div style={{ fontSize: 12, fontStyle: 'italic', color: 'var(--on-surface-variant)', marginTop: 8, lineHeight: 1.5, whiteSpace: 'pre-wrap' }}>"{c.musicUse}"</div>}
            </div>
          )}
          {c.history && (
            <div style={{ padding: '14px 0', borderTop: '0.5px solid var(--outline-variant)' }}>
              <div style={{ fontSize: 10, letterSpacing: 0.22, textTransform: 'uppercase', color: 'var(--on-surface-variant)', marginBottom: 6 }}>Us</div>
              {c.history.duration && <div style={{ fontSize: 13, marginBottom: 8 }}>{c.history.duration}</div>}
              {c.history.good && <div style={{ fontSize: 12, lineHeight: 1.5, whiteSpace: 'pre-wrap', marginBottom: 6 }}><b style={{ fontSize: 10, letterSpacing: 0.18, textTransform: 'uppercase', color: 'var(--on-surface-variant)' }}>Good · </b>{c.history.good}</div>}
              {c.history.hard && <div style={{ fontSize: 12, lineHeight: 1.5, whiteSpace: 'pre-wrap', marginBottom: 6 }}><b style={{ fontSize: 10, letterSpacing: 0.18, textTransform: 'uppercase', color: 'var(--on-surface-variant)' }}>Hard · </b>{c.history.hard}</div>}
              {c.history.moments && <div style={{ fontSize: 12, lineHeight: 1.5, whiteSpace: 'pre-wrap' }}><b style={{ fontSize: 10, letterSpacing: 0.18, textTransform: 'uppercase', color: 'var(--on-surface-variant)' }}>Moments · </b>{c.history.moments}</div>}
            </div>
          )}
          {c.voiceId && (
            <div style={{ padding: '14px 0', borderTop: '0.5px solid var(--outline-variant)' }}>
              <div style={{ fontSize: 10, letterSpacing: 0.22, textTransform: 'uppercase', color: 'var(--on-surface-variant)', marginBottom: 4 }}>Voice</div>
              <div style={{ fontSize: 12, fontFamily: 'ui-monospace, monospace' }}>{c.voiceId}</div>
            </div>
          )}
        </div>
      </div>
    );
  }

  // group by first letter (JP chars → #)
  const groups = {};
  contacts.forEach(c => {
    const key = /[A-Z]/i.test((c.name || '?')[0]) ? c.name[0].toUpperCase() : '#';
    (groups[key] = groups[key] || []).push(c);
  });
  const keys = Object.keys(groups).sort();

  return (
    <div style={{ display: 'flex', flexDirection: 'column', height: '100%', position: 'relative' }}>
      <AppBar title="Contacts" onBack={onExit} right={
        <button onClick={() => setWizard('new')} style={iconBtn2} title="New character">
          <span className="msi" style={{ fontSize: 22 }} data-icon="person_add"></span>
        </button>
      } />
      <div style={{ flex: 1, overflowY: 'auto' }} className="no-scrollbar">
        {keys.map(k => (
          <div key={k}>
            <div style={{
              padding: '6px 24px', fontSize: 10, letterSpacing: 0.24,
              textTransform: 'uppercase', color: 'var(--on-surface-variant)',
              background: 'var(--surface-container-low)', fontWeight: 600,
            }}>{k}</div>
            {groups[k].map(c => (
              <button key={c.id} onClick={() => setSelected(c)} style={{
                display: 'flex', alignItems: 'center', gap: 14, width: '100%',
                padding: '12px 20px', background: 'transparent', border: 0, cursor: 'pointer',
                textAlign: 'left', borderBottom: '0.5px solid var(--outline-variant)',
              }}>
                <div style={{
                  width: 38, height: 38, borderRadius: '50%', overflow: 'hidden',
                  background: 'var(--surface-container)', flexShrink: 0,
                }}>
                  {c.avatar ? (
                    <img src={c.avatar} alt="" style={{ width: '100%', height: '100%', objectFit: 'cover' }} />
                  ) : (
                    <PhotoPlaceholder label={c.name} tone="dark" style={{ borderRadius: 0 }} />
                  )}
                </div>
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ fontFamily: 'var(--font-serif)', fontSize: 15, fontWeight: 600 }}>{c.name}</div>
                  <div style={{ fontSize: 11, color: 'var(--on-surface-variant)', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{c.role || c.occupation || c.handle}</div>
                </div>
                <span className="msi" style={{ fontSize: 16, color: 'var(--outline)' }} data-icon="chevron_right"></span>
              </button>
            ))}
          </div>
        ))}
      </div>
    </div>
  );
};

// — Profile section
const ProfileSection = ({ onBack, state, setState }) => {
  const profile = state.profile || {};
  const [draft, setDraft] = React.useState({
    name: profile.name || '',
    handle: profile.handle || '',
    badge: profile.badge || '',
    subtitle: profile.subtitle || '',
    avatar: profile.avatar || null,
  });
  const [saveState, setSaveState] = React.useState('idle'); // idle | ok
  const fileRef = React.useRef(null);
  const isDirty = JSON.stringify(draft) !== JSON.stringify({
    name: profile.name || '',
    handle: profile.handle || '',
    badge: profile.badge || '',
    subtitle: profile.subtitle || '',
    avatar: profile.avatar || null,
  });

  const set = (k, v) => setDraft(d => ({ ...d, [k]: v }));

  const onFile = (e) => {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => set('avatar', reader.result); // data URL — persisted into state.profile.avatar
    reader.readAsDataURL(file);
    e.target.value = '';
  };

  const handleSave = () => {
    setState(s => ({ ...s, profile: { ...s.profile, ...draft } }));
    setSaveState('ok');
    setTimeout(() => setSaveState('idle'), 1400);
  };

  const inputStyle = {
    width: '100%', fontFamily: 'var(--font-sans)', fontSize: 14,
    padding: '8px 10px', border: '0.5px solid var(--outline-variant)', borderRadius: 10,
    background: 'var(--surface)', color: 'var(--on-surface)', outline: 'none',
    boxSizing: 'border-box',
  };

  return (
    <div style={{ display: 'flex', flexDirection: 'column', height: '100%' }}>
      <SectionHeader title="Profile" onBack={onBack} />
      <div style={{ flex: 1, overflowY: 'auto', padding: '0 0 24px' }} className="no-scrollbar">
        {/* Avatar */}
        <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', padding: '8px 20px 20px' }}>
          <div style={{
            width: 96, height: 96, borderRadius: '50%',

                padding: '6px 12px', borderRadius: 9999,
                border: '0.5px solid var(--outline-variant)', background: 'transparent',
                fontSize: 11, fontFamily: 'var(--font-sans)', cursor: 'pointer', color: 'var(--on-surface-variant)',
              }}>Remove</button>
            )}

          <div style={{ fontSize: 10, color: 'var(--on-surface-variant)', marginTop: 8, textAlign: 'center', maxWidth: 220 }}>
            Photo is saved locally and shown on the home screen widget.
          </div>

        <SettingsGroup header="Display name">
          <div style={{ padding: 12 }}>
            <input value={draft.name} onChange={e => set('name', e.target.value)} style={inputStyle} />
          </div>
        </SettingsGroup>
        <SettingsGroup header="Handle">
          <div style={{ padding: 12 }}>
            <input value={draft.handle} onChange={e => set('handle', e.target.value)} style={inputStyle} />
          </div>
        </SettingsGroup>
        <SettingsGroup header="Badge">
          <div style={{ padding: 12 }}>
            <input value={draft.badge} onChange={e => set('badge', e.target.value)} placeholder="e.g. baby, love, mine" style={{ ...inputStyle, fontSize: 13 }} />
          </div>
        </SettingsGroup>
        <SettingsGroup header="Bio">
          <div style={{ padding: 12 }}>
            <textarea value={draft.subtitle} onChange={e => set('subtitle', e.target.value)} rows={3} style={{
              ...inputStyle, fontSize: 13, lineHeight: 1.5, resize: 'none',
            }} />
          </div>
        </SettingsGroup>

        {/* Save button */}
        <div style={{ padding: '4px 16px 12px' }}>
          <button onClick={handleSave} disabled={!isDirty && saveState !== 'ok'} style={{
            width: '100%',
            background: saveState === 'ok' ? '#6d8a6d'
              : isDirty ? 'var(--primary)' : 'var(--surface-container)',
            color: saveState === 'ok' || isDirty ? 'var(--on-primary)' : 'var(--outline)',
            border: 0, borderRadius: 12,
            padding: '12px', cursor: isDirty || saveState === 'ok' ? 'pointer' : 'default',
            fontSize: 13, fontWeight: 700, fontFamily: 'var(--font-sans)',
            display: 'inline-flex', alignItems: 'center', justifyContent: 'center', gap: 6,
          }}>
            <span className="msi" style={{ fontSize: 16 }}>{saveState === 'ok' ? 'check' : 'save'}</span>
            {saveState === 'ok' ? 'Saved' : isDirty ? 'Save changes' : 'No changes'}
          </button>
        </div>
      </div>
    </div>
  );
};

// — General API section (presets, base URL, key, model fetch, save)
const GeneralApiSection = ({ onBack }) => {
  const storageKey = 'klp_general_api';
  const presetsKey = 'klp_general_api_presets';

  const initial = () => { try { return JSON.parse(localStorage.getItem(storageKey) || '{}'); } catch { return {}; } };
  const [values, setValues] = React.useState(initial);
  const [presets, setPresets] = React.useState(() => { try { return JSON.parse(localStorage.getItem(presetsKey) || '[]'); } catch { return []; } });
  const [revealed, setRevealed] = React.useState(false);
  const [fetchState, setFetchState] = React.useState('idle'); // idle | loading | ok | err
  const [modelList, setModelList] = React.useState([]);
  const [showModels, setShowModels] = React.useState(false);
  const [saveState, setSaveState] = React.useState('idle');
  const [presetName, setPresetName] = React.useState('');
  const [presetOpen, setPresetOpen] = React.useState(false);

  const set = (k, v) => setValues(prev => ({ ...prev, [k]: v }));

  const handleSave = () => {
    localStorage.setItem(storageKey, JSON.stringify(values));
    setSaveState('ok');
    setTimeout(() => setSaveState('idle'), 1400);
  };

  const handleFetchModels = async () => {
    if (!values.baseUrl || !values.apiKey) {
      setFetchState('err');
      setTimeout(() => setFetchState('idle'), 1600);
      return;
    }
    setFetchState('loading');
    try {
      const base = values.baseUrl.replace(/\/+$/, '');
      const url = `${base}/v1/models`;
      const res = await fetch(url, { headers: { 'Authorization': `Bearer ${values.apiKey}` } });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      const ids = (data.data || data.models || []).map(m => m.id || m.name || m).filter(Boolean);
      if (ids.length === 0) throw new Error('No models');
      setModelList(ids);
      setShowModels(true);
      setFetchState('ok');
    } catch (e) {
      setFetchState('err');
      setTimeout(() => setFetchState('idle'), 1800);
    }
  };

  const savePreset = () => {
    const name = presetName.trim();
    if (!name) return;
    const entry = { name, baseUrl: values.baseUrl || '', apiKey: values.apiKey || '', model: values.model || '' };
    const next = [...presets.filter(p => p.name !== name), entry];
    setPresets(next);
    localStorage.setItem(presetsKey, JSON.stringify(next));
    setPresetName('');
    setPresetOpen(false);
  };
  const loadPreset = (p) => {
    setValues({ baseUrl: p.baseUrl, apiKey: p.apiKey, model: p.model });
    setModelList([]); setShowModels(false);
  };
  const deletePreset = (name) => {
    const next = presets.filter(p => p.name !== name);
    setPresets(next);
    localStorage.setItem(presetsKey, JSON.stringify(next));
  };

  const inputStyle = {
    width: '100%', fontFamily: 'var(--font-sans)',
    fontSize: 13, padding: '10px 12px',
    border: '0.5px solid var(--outline-variant)', borderRadius: 10,
    background: 'var(--surface)', color: 'var(--on-surface)', outline: 'none',
    boxSizing: 'border-box',
  };
  const labelStyle = {
    fontSize: 11, fontFamily: 'var(--font-sans)', fontWeight: 600,
    color: 'var(--on-surface-variant)', letterSpacing: 0.18, textTransform: 'uppercase',
    marginBottom: 6, display: 'block',
  };

  return (
    <div style={{ display: 'flex', flexDirection: 'column', height: '100%' }}>
      <SectionHeader title="General API" onBack={onBack} />
      <div style={{ flex: 1, overflowY: 'auto', padding: '0 0 24px' }} className="no-scrollbar">
        <div style={{ fontFamily: 'var(--font-serif)', fontSize: 15, fontStyle: 'italic', color: 'var(--on-surface-variant)', padding: '4px 24px 14px' }}>
          Connect a model for Diary, Calendar and other text generation.
        </div>

        {/* Presets bar */}
        <div style={{ padding: '0 16px 16px' }}>
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 8 }}>
            <span style={labelStyle}>Presets</span>
            <button onClick={() => setPresetOpen(o => !o)} style={{
              background: 'transparent', border: 0, cursor: 'pointer',
              color: 'var(--primary)', fontSize: 11, fontWeight: 600,
              display: 'inline-flex', alignItems: 'center', gap: 3,
            }}>
              <span className="msi" style={{ fontSize: 14 }} data-icon="add"></span>Save current
            </button>
          </div>
          {presets.length === 0 ? (
            <div style={{
              padding: '10px 12px', borderRadius: 10,
              background: 'var(--surface-container-low)',
              fontSize: 11, color: 'var(--on-surface-variant)', fontStyle: 'italic',
            }}>
              No presets yet. Configure an API below and tap "Save current" to store it.
            </div>
          ) : (
            <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6 }}>
              {presets.map(p => (
                <div key={p.name} style={{
                  display: 'inline-flex', alignItems: 'center', gap: 4,
                  background: 'var(--surface-container-low)',
                  border: '0.5px solid var(--outline-variant)',
                  borderRadius: 9999, padding: '4px 4px 4px 12px',
                }}>
                  <button onClick={() => loadPreset(p)} style={{
                    background: 'transparent', border: 0, cursor: 'pointer', padding: '4px 4px',
                    fontSize: 12, fontFamily: 'var(--font-sans)', color: 'var(--on-surface)', fontWeight: 500,
                  }}>{p.name}</button>
                  <button onClick={() => deletePreset(p.name)} title="Delete preset" style={{
                    background: 'transparent', border: 0, cursor: 'pointer',
                    color: 'var(--on-surface-variant)', padding: 4,
                    display: 'inline-flex', alignItems: 'center',
                  }}><span className="msi" style={{ fontSize: 14 }} data-icon="close"></span></button>
                </div>
              ))}
            </div>
          )}
          {presetOpen && (
            <div style={{ display: 'flex', gap: 6, marginTop: 8 }}>
              <input
                value={presetName} onChange={e => setPresetName(e.target.value)}
                placeholder="Preset name (e.g. Anthropic, Local)"
                onKeyDown={e => { if (e.key === 'Enter') savePreset(); }}
                style={{ ...inputStyle, flex: 1, fontSize: 12, padding: '8px 10px' }}
              />
              <button onClick={savePreset} disabled={!presetName.trim()} style={{
                background: presetName.trim() ? 'var(--primary)' : 'var(--surface-container)',
                color: presetName.trim() ? 'var(--on-primary)' : 'var(--outline)',
                border: 0, borderRadius: 10, padding: '8px 14px',
                cursor: presetName.trim() ? 'pointer' : 'default',
                fontSize: 12, fontWeight: 600,
              }}>Save</button>
            </div>
          )}
        </div>

        {/* Base URL */}
        <div style={{ padding: '0 16px 14px' }}>
          <label style={labelStyle}>Base URL</label>
          <input
            value={values.baseUrl || ''}
            onChange={e => set('baseUrl', e.target.value)}
            placeholder="https://api.anthropic.com"
            style={inputStyle}
          />
        </div>

        {/* API Key */}
        <div style={{ padding: '0 16px 14px' }}>
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 6 }}>
            <label style={{ ...labelStyle, marginBottom: 0 }}>API key</label>
            <button onClick={() => setRevealed(r => !r)} style={{
              background: 'transparent', border: 0, cursor: 'pointer',
              color: 'var(--on-surface-variant)', fontSize: 11, fontFamily: 'var(--font-sans)',
              display: 'inline-flex', alignItems: 'center', gap: 3,
            }}>
              <span className="msi" style={{ fontSize: 14 }}>{revealed ? 'visibility_off' : 'visibility'}</span>
              {revealed ? 'Hide' : 'Show'}
            </button>
          </div>
          <input
            type={revealed ? 'text' : 'password'}
            value={values.apiKey || ''}
            onChange={e => set('apiKey', e.target.value)}
            placeholder="sk-..."
            style={{
              ...inputStyle,
              fontFamily: 'ui-monospace, SFMono-Regular, Menlo, monospace',
              letterSpacing: revealed ? 'normal' : '2px',
            }}
          />
        </div>

        {/* Model + Fetch */}
        <div style={{ padding: '0 16px 18px' }}>
          <label style={labelStyle}>Model</label>
          <div style={{ display: 'flex', gap: 6 }}>
            <input
              value={values.model || ''}
              onChange={e => set('model', e.target.value)}
              placeholder="e.g. claude-haiku-4-5"
              style={{ ...inputStyle, flex: 1 }}
            />
            <button onClick={handleFetchModels} disabled={fetchState === 'loading'} style={{
              background: fetchState === 'err' ? '#c75a5a'
                : fetchState === 'ok' ? 'var(--primary)'
                : 'var(--surface-container-high)',
              color: fetchState === 'err' || fetchState === 'ok' ? '#fff' : 'var(--on-surface)',
              border: '0.5px solid var(--outline-variant)',
              borderRadius: 10, padding: '0 14px',
              cursor: fetchState === 'loading' ? 'wait' : 'pointer',
              fontSize: 12, fontWeight: 600,
              display: 'inline-flex', alignItems: 'center', gap: 5,
              minWidth: 82, justifyContent: 'center',
            }}>
              <span className="msi" style={{
                fontSize: 16,
                animation: fetchState === 'loading' ? 'jiggle 0.3s infinite' : 'none',
              }}>{fetchState === 'err' ? 'error' : fetchState === 'ok' ? 'check' : 'download'}</span>
              {fetchState === 'loading' ? 'Fetching' : fetchState === 'err' ? 'Failed' : 'Fetch'}
            </button>
          </div>

          {showModels && modelList.length > 0 && (
            <div style={{
              marginTop: 8, maxHeight: 180, overflowY: 'auto',
              background: 'var(--surface-container-low)', borderRadius: 10,
              border: '0.5px solid var(--outline-variant)',
            }} className="no-scrollbar">
              {modelList.map(id => (
                <button key={id} onClick={() => { set('model', id); setShowModels(false); }} style={{
                  display: 'flex', width: '100%', alignItems: 'center', gap: 8,
                  padding: '8px 12px', background: 'transparent', border: 0, cursor: 'pointer',
                  borderBottom: '0.5px solid var(--outline-variant)', textAlign: 'left',
                  fontFamily: 'ui-monospace, monospace', fontSize: 11, color: 'var(--on-surface)',
                }}>
                  {values.model === id && <span className="msi" style={{ fontSize: 14, color: 'var(--primary)' }} data-icon="check"></span>}
                  <span style={{ flex: 1 }}>{id}</span>
                </button>
              ))}
            </div>
          )}
          <div style={{ fontSize: 10, color: 'var(--on-surface-variant)', marginTop: 6 }}>
            Fetch pulls available models from <span style={{ fontFamily: 'monospace' }}>{`{baseUrl}/v1/models`}</span> using your key.
          </div>
        </div>

        {/* Save button */}
        <div style={{ padding: '0 16px 16px' }}>
          <button onClick={handleSave} style={{
            width: '100%',
            background: saveState === 'ok' ? '#6d8a6d' : 'var(--primary)',
            color: 'var(--on-primary)', border: 0, borderRadius: 12,
            padding: '12px', cursor: 'pointer',
