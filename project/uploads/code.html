</div>

</div>
</section>
<!-- App Icon Grid -->
<section class="grid grid-cols-4 gap-y-5 gap-x-3 px-1">

<span class="material-symbols-outlined text-primary text-2xl" data-icon="chat_bubble" style="">chat_bubble</span>
</div>
<span class="font-['Plus_Jakarta_Sans'] text-[9px] font-medium text-on-surface uppercase tracking-widest" style="">WeChat</span>
</div>
<!-- Calendar -->
<div class="flex flex-col items-center gap-2 group cursor-pointer transition-transform duration-300 active:scale-90">
<div class="w-12 h-12 rounded-2xl bg-surface-container-lowest shadow-sm flex items-center justify-center border border-outline-variant/10">
<span class="material-symbols-outlined text-primary text-2xl" data-icon="calendar_today" style="">calendar_today</span>

<span class="font-['Plus_Jakarta_Sans'] text-[9px] font-medium text-on-surface uppercase tracking-widest" style="">Date</span>

<span class="material-symbols-outlined text-primary text-2xl" data-icon="photo_camera" style="">photo_camera</span>
</div>
<span class="font-['Plus_Jakarta_Sans'] text-[9px] font-medium text-on-surface uppercase tracking-widest" style="">Snap</span>

<div class="w-12 h-12 rounded-2xl bg-surface-container-lowest shadow-sm flex items-center justify-center border border-outline-variant/10">
<span class="material-symbols-outlined text-primary text-2xl" data-icon="music_note" style="">music_note</span>
</div>
<span class="font-['Plus_Jakarta_Sans'] text-[9px] font-medium text-on-surface uppercase tracking-widest" style="">Audio</span>
</div>
<!-- Maps -->
<div class="flex flex-col items-center gap-2 group cursor-pointer transition-transform duration-300 active:scale-90">
<div class="w-12 h-12 rounded-2xl bg-surface-container-lowest shadow-sm flex items-center justify-center border border-outline-variant/10">
<span class="material-symbols-outlined text-primary text-2xl" data-icon="explore" style="">explore</span>
</div>
<span class="font-['Plus_Jakarta_Sans'] text-[9px] font-medium text-on-surface uppercase tracking-widest" style="">Map</span>

<div class="w-12 h-12 rounded-2xl bg-surface-container-lowest shadow-sm flex items-center justify-center border border-outline-variant/10">
<span class="material-symbols-outlined text-primary text-2xl" data-icon="favorite" style="">favorite</span>
</div>
<span class="font-['Plus_Jakarta_Sans'] text-[9px] font-medium text-on-surface uppercase tracking-widest" style="">Vitals</span>

<div class="w-12 h-12 rounded-2xl bg-surface-container-lowest shadow-sm flex items-center justify-center border border-outline-variant/10">

<span class="font-['Plus_Jakarta_Sans'] text-[9px] font-medium text-on-surface uppercase tracking-widest" style="">Docs</span>

<div class="absolute inset-0 bg-black/5"></div>
</div>

<!-- Phone -->
<button class="p-3 text-zinc-600 dark:text-zinc-400 hover:bg-white/40 dark:hover:bg-zinc-600/40 rounded-2xl transition-all duration-300 active:scale-90" style="">
